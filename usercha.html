<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>페르소나 보관함</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect x='1' y='1' width='14' height='14' rx='3' fill='%232f6df0'/><circle cx='8' cy='6' r='2.6' fill='%23ffffff'/><path d='M3.5 14a4.5 4.5 0 0 1 9 0z' fill='%23ffffff'/></svg>">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<style>
  :root {
    --bg: #f1f3f7;
    --panel: #ffffff;
    --border: #dde2ea;
    --text: #41454f;
    --text-strong: #1a1d24;
    --text-dim: #858a99;
    --accent: #2f6df0;
    --accent-deep: #2258cc;
    --accent-soft: #e6eefe;
    --field: #f8f9fc;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 10px 30px rgba(0,0,0,0.06);
    --ui: 'Pretendard Variable', 'Pretendard', -apple-system, sans-serif;
  }
  [data-theme="dark"] {
    --bg: #15161c;
    --panel: #1d1e26;
    --border: #2c2e3a;
    --text: #c5c8d2;
    --text-strong: #e7e9ef;
    --text-dim: #888c9c;
    --accent: #5b9bf0;
    --accent-deep: #7db2f5;
    --accent-soft: #1d2a44;
    --field: #191a21;
    --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 10px 30px rgba(0,0,0,0.28);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }
  body {
    font-family: var(--ui);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background 0.25s ease, color 0.25s ease;
  }
  /* ===== 헤더 ===== */
  header {
    height: 56px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 18px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    position: sticky; top: 0; z-index: 30;
  }
  .brand {
    display: flex; align-items: center; gap: 9px;
    font-weight: 600; font-size: 15px;
    letter-spacing: -0.02em; color: var(--text-strong);
  }
  .brand .mark {
    width: 22px; height: 22px;
    border-radius: 7px;
    background: linear-gradient(135deg, #6fb0f5, #3f6fd8);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
  }
  .brand small { color: var(--text-dim); font-weight: 400; font-size: 11px; }
  .header-actions { display: flex; gap: 7px; align-items: center; }
  button {
    font-family: var(--ui);
    font-size: 12px; font-weight: 500;
    color: var(--text);
    background: var(--field);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 7px 12px;
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
    transition: all 0.13s ease;
  }
  button:hover { border-color: var(--accent); color: var(--accent-deep); }
  button:active { transform: translateY(1px); }
  button svg { width: 14px; height: 14px; }
  button.primary {
    background: var(--accent); border-color: var(--accent); color: #fff;
  }
  button.primary:hover { opacity: 0.9; color: #fff; }
  button.icon { padding: 7px; }
  button.danger:hover { border-color: #e0556b; color: #e0556b; }
  /* ===== 레이아웃 ===== */
  main {
    display: flex;
    min-height: calc(100vh - 56px);
  }
  /* 사이드바 — 카테고리 */
  .sidebar {
    width: 220px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    background: var(--panel);
    padding: 16px 12px;
    display: flex; flex-direction: column;
    gap: 4px;
  }
  .side-title {
    font-size: 10.5px; font-weight: 600;
    letter-spacing: 0.05em; text-transform: uppercase;
    color: var(--text-dim);
    padding: 4px 8px 8px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .cat-add-btn {
    border: 0; background: transparent;
    color: var(--text-dim); font-size: 15px;
    padding: 0 4px; cursor: pointer; line-height: 1;
  }
  .cat-add-btn:hover { color: var(--accent-deep); }
  .cat-item {
    position: relative;
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.12s ease;
  }
  .cat-item:hover { background: var(--field); }
  .cat-item.active {
    background: var(--accent-soft);
    color: var(--accent-deep);
    font-weight: 600;
  }
  /* 카테고리 라벨 (화살표 + 이름) */
  .cat-item .cat-label {
    display: flex; align-items: center; gap: 6px;
    min-width: 0; overflow: hidden;
    white-space: nowrap; text-overflow: ellipsis;
  }
  /* 하위 카테고리 */
  .cat-item.cat-sub { font-size: 12px; }
  /* 대분류 — 옅은 배경으로 그룹 구분 */
  .cat-item.cat-top {
    background: var(--field);
    font-weight: 600;
  }
  .cat-item.cat-top:hover { background: var(--border); }
  .cat-item.cat-top.active {
    background: var(--accent-soft);
    color: var(--accent-deep);
  }
  /* 대분류 접기/펴기 토글 */
  .cat-item .cat-toggle {
    font-size: 9px;
    color: var(--text-dim);
    flex-shrink: 0;
    width: 11px; text-align: center;
    cursor: pointer;
  }
  .cat-item .cat-toggle:hover { color: var(--accent-deep); }
  /* 2단계 카테고리끼리 사이 — 짧고 옅은 구분선 */
  .cat-item.cat-level-line::before {
    content: "";
    position: absolute;
    top: 0; left: 14px; right: 14px;
    border-top: 1px solid var(--text-faint, rgba(0,0,0,0.06));
    opacity: 0.6;
  }
  [data-theme="dark"] .cat-item.cat-level-line::before {
    border-top-color: rgba(255,255,255,0.09);
  }
  /* "전체"와 카테고리 목록 사이 간격 */
  .cat-item.cat-all { margin-bottom: 4px; }
  /* 최상위 카테고리 사이 간격 */
  .cat-item.cat-top-divider {
    margin-top: 6px;
  }
  /* 미분류 — 맨 아래, 위에 구분선 */
  .cat-item.cat-uncat {
    margin-top: 6px;
    color: var(--text-dim);
  }
  /* AU 목록 섹션 */
  .side-sec-title {
    font-size: 10.5px; font-weight: 600;
    letter-spacing: 0.05em; text-transform: uppercase;
    color: var(--text-dim);
    margin-top: 16px;
    border-top: 1px dashed var(--border);
    border-image: none;
    padding: 14px 8px 8px;
  }
  [data-theme="light"] .side-sec-title { border-top-color: rgba(0,0,0,0.09); }
  [data-theme="dark"] .side-sec-title { border-top-color: rgba(255,255,255,0.1); }
  /* AU 항목 */
  .ver-item {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px;
    border-radius: 8px;
    font-size: 12.5px;
    cursor: grab;
    transition: background 0.12s ease;
  }
  .ver-item:hover { background: var(--field); }
  /* 하위 AU 항목 — 들여쓰기 + 작게 */
  .ver-item.ver-item-sub {
    padding-left: 28px;
    font-size: 12px;
  }
  .ver-item.ver-item-sub .ver-name { color: var(--text-dim); }
  .ver-item.ver-item-sub.active .ver-name { color: var(--accent-deep); }
  .ver-item.ver-item-sub .ver-dot { opacity: 0.4; }
  .ver-item .ver-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0; opacity: 0.7;
  }
  .ver-item .ver-name {
    min-width: 0; overflow: hidden;
    white-space: nowrap; text-overflow: ellipsis;
  }
  .ver-item.active {
    background: var(--accent-soft);
    color: var(--accent-deep);
    font-weight: 600;
  }
  .ver-item.active .ver-dot { opacity: 1; }
  .ver-item .ver-count {
    margin-left: auto;
    font-size: 11px;
    color: var(--text-dim);
    background: var(--field);
    border-radius: 10px;
    padding: 1px 8px;
  }
  .ver-item.active .ver-count {
    background: var(--panel);
    color: var(--accent-deep);
  }
  .ver-empty {
    font-size: 10.5px; color: var(--text-dim);
    padding: 2px 10px;
    opacity: 0.8; line-height: 1.5;
  }
  /* 카테고리 드래그 */
  .cat-item { cursor: grab; }
  .cat-item.cat-dragging { opacity: 0.45; }
  .cat-item.cat-drag-over {
    box-shadow: inset 0 2px 0 var(--accent);
  }
  /* 하위 카테고리 — 회색 글씨 (단계 색 구분 없음) */
  .cat-item.cat-sub .cat-name { color: var(--text-dim); }
  /* 선택된 하위 카테고리는 강조색 */
  .cat-item.cat-sub.active .cat-name { color: var(--accent-deep); }
  .cat-item .cat-count {
    margin-left: auto;
    font-size: 11px;
    color: var(--text-dim);
    background: var(--field);
    border-radius: 10px;
    padding: 1px 8px;
  }
  .cat-item.active .cat-count {
    background: var(--panel);
    color: var(--accent-deep);
  }
  .cat-item .cat-del {
    margin-left: 4px;
    border: 0; background: transparent;
    color: var(--text-dim);
    font-size: 13px; cursor: pointer;
    padding: 0 2px; line-height: 1;
    display: none;
  }
  .cat-item:hover .cat-del { display: block; }
  .cat-item .cat-del:hover { color: #e0556b; }
  /* 콘텐츠 영역 */
  .content {
    flex: 1;
    padding: 22px 24px 60px;
    min-width: 0;
  }
  .content-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 18px;
    gap: 12px; flex-wrap: wrap;
  }
  .content-title {
    font-size: 18px; font-weight: 700;
    color: var(--text-strong);
    letter-spacing: -0.02em;
  }
  .content-title .ct-count {
    font-size: 13px; font-weight: 400;
    color: var(--text-dim);
    margin-left: 8px;
  }
  .search-box {
    position: relative;
  }
  .search-box input {
    font-family: var(--ui); font-size: 12.5px;
    color: var(--text); background: var(--field);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 12px 8px 30px; outline: none;
    width: 200px;
    transition: border-color 0.13s ease;
  }
  .search-box input:focus { border-color: var(--accent); }
  .search-box svg {
    position: absolute; left: 9px; top: 50%;
    transform: translateY(-50%);
    width: 14px; height: 14px; color: var(--text-dim);
  }
  /* 페르소나 카드 그리드 */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 14px;
  }
  .card {
    position: relative;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.14s ease, box-shadow 0.14s ease, border-color 0.14s ease;
  }
  .card:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow);
    border-color: var(--accent);
  }
  /* 드래그 중 */
  .card.dragging {
    opacity: 0.45;
    cursor: grabbing;
  }
  /* 드롭 대상 표시 */
  .card.drag-over {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-soft);
    transform: scale(1.03);
  }
  .card-img {
    width: 100%;
    aspect-ratio: 1 / 1;
    background: var(--field);
    background-size: cover;
    background-position: center;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-dim);
    font-size: 30px;
  }
  .card-body { padding: 11px 13px 13px; }
  .card-name {
    font-size: 14px; font-weight: 700;
    color: var(--text-strong);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card-meta {
    font-size: 11px; color: var(--text-dim);
    margin-top: 3px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card-tagline {
    font-size: 11.5px; color: var(--text);
    margin-top: 6px;
    line-height: 1.45;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-chars {
    margin-top: 8px;
    display: flex; flex-wrap: wrap; gap: 4px;
  }
  .char-chip {
    font-size: 10px;
    background: var(--accent-soft);
    color: var(--accent-deep);
    border-radius: 9px;
    padding: 2px 7px;
    white-space: nowrap;
  }
  .char-chip.more { background: var(--field); color: var(--text-dim); }
  /* 카드 위 배지 — AU 라벨 */
  .card-badge {
    position: absolute;
    top: 8px; left: 8px;
    font-size: 10px; font-weight: 700;
    background: rgba(20,22,30,0.74);
    color: #fff;
    border-radius: 8px;
    padding: 3px 8px;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    letter-spacing: -0.01em;
    max-width: calc(100% - 16px);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card-badge.au { background: rgba(47,109,240,0.92); }
  /* 빈 상태 */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }
  .empty .e-emoji { font-size: 40px; }
  .empty .e-title {
    font-size: 15px; font-weight: 600;
    color: var(--text);
    margin: 12px 0 5px;
  }
  .empty .e-sub { font-size: 12.5px; }
  .empty button { margin-top: 16px; }
  /* ===== 모달 ===== */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(20,20,28,0.5);
    backdrop-filter: blur(3px);
    -webkit-backdrop-filter: blur(3px);
    display: none;
    align-items: center; justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .overlay.show { display: flex; }
  .modal {
    background: var(--panel);
    border-radius: 16px;
    box-shadow: var(--shadow);
    width: 480px; max-width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    animation: pop 0.2s cubic-bezier(.22,1,.36,1);
  }
  .modal.modal-sm { width: 360px; }
  @keyframes pop {
    from { opacity: 0; transform: scale(0.96) translateY(8px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
  .modal-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 18px;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0;
    background: var(--panel);
    border-radius: 16px 16px 0 0;
    z-index: 5;
  }
  .modal-head h2 {
    font-size: 14.5px; font-weight: 700;
    color: var(--text-strong);
  }
  .modal-close {
    border: 0; background: transparent;
    color: var(--text-dim); font-size: 20px;
    cursor: pointer; padding: 0 4px; line-height: 1;
  }
  .modal-close:hover { color: var(--text); }
  .modal-body { padding: 18px; }
  .field { margin-bottom: 14px; }
  .field-hint {
    font-size: 10.5px; color: var(--text-dim);
    margin-top: 5px; line-height: 1.5;
  }
  .field label {
    display: block;
    font-size: 11.5px; font-weight: 600;
    color: var(--text-dim);
    margin-bottom: 5px;
  }
  .field input[type="text"],
  .field input[type="number"],
  .field textarea,
  .field select {
    width: 100%;
    font-family: var(--ui); font-size: 12.5px;
    color: var(--text); background: var(--field);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 9px 11px; outline: none;
    transition: border-color 0.13s ease;
  }
  .field input:focus, .field textarea:focus, .field select:focus {
    border-color: var(--accent);
  }
  .field textarea { resize: vertical; min-height: 60px; line-height: 1.5; }
  .field-row { display: flex; gap: 10px; }
  .field-row .field { flex: 1; }
  /* ===== AU 탭 (편집·상세 공용) ===== */
  .ver-tabs {
    display: flex; align-items: center;
    gap: 4px;
    flex-wrap: wrap;
    padding: 10px 18px;
    border-bottom: 1px solid var(--border);
    background: var(--field);
  }
  .ver-tab {
    font-family: var(--ui);
    font-size: 11.5px; font-weight: 600;
    color: var(--text-dim);
    background: transparent;
    border: 1px solid transparent;
    border-radius: 8px;
    padding: 6px 11px;
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 5px;
    transition: all 0.12s ease;
    max-width: 180px;
  }
  .ver-tab .vt-label {
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .ver-tab:hover { color: var(--accent-deep); background: var(--panel); }
  .ver-tab.on {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .ver-tab.on:hover { color: #fff; }
  /* AU 탭 드래그 */
  .ver-tab[draggable="true"] { cursor: grab; }
  .ver-tab.ver-tab-dragging { opacity: 0.4; }
  .ver-tab.ver-tab-drag-over {
    box-shadow: inset 2px 0 0 var(--accent);
  }
  /* 오리지널 표시 별 */
  .ver-tab .vt-star { font-size: 9px; opacity: 0.85; }
  /* AU 추가 버튼 */
  .ver-tab-add {
    font-family: var(--ui);
    font-size: 13px; font-weight: 700;
    color: var(--text-dim);
    background: transparent;
    border: 1px dashed var(--border);
    border-radius: 8px;
    padding: 5px 10px;
    cursor: pointer;
    transition: all 0.12s ease;
  }
  .ver-tab-add:hover { color: var(--accent-deep); border-color: var(--accent); }
  /* 이미지 업로드 */
  .img-upload {
    width: 138px;
    align-self: stretch;
    min-height: 138px;
    border-radius: 12px;
    border: 1.5px dashed var(--border);
    background: var(--field);
    background-size: cover; background-position: center;
    cursor: pointer;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 5px;
    color: var(--text-dim);
    font-size: 11px;
    flex-shrink: 0;
    transition: border-color 0.13s ease;
  }
  .img-upload:hover { border-color: var(--accent); }
  .img-upload.has-img { border-style: solid; }
  .img-upload .iu-icon { font-size: 24px; }
  .img-row { display: flex; gap: 14px; align-items: stretch; }
  .img-row .img-side {
    flex: 1;
    display: flex; flex-direction: column;
    justify-content: center;
  }
  /* 함께한 캐릭터 입력 */
  .char-input-row { display: flex; gap: 6px; }
  .char-input-row input { flex: 1; }
  .char-input-row button { flex-shrink: 0; }
  .char-list {
    display: flex; flex-wrap: wrap; gap: 5px;
    margin-top: 8px;
  }
  .char-tag {
    display: flex; align-items: center; gap: 5px;
    font-size: 11.5px;
    background: var(--accent-soft);
    color: var(--accent-deep);
    border-radius: 11px;
    padding: 3px 5px 3px 10px;
  }
  .char-tag button {
    border: 0; background: transparent;
    color: var(--accent-deep); cursor: pointer;
    font-size: 13px; padding: 0; line-height: 1;
    width: 15px; height: 15px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
  }
  .char-tag button:hover { background: rgba(0,0,0,0.1); }
  /* AU 정보 편집 줄 (오리지널 체크박스 + 삭제) */
  .ver-label-row {
    display: flex; flex-direction: column; gap: 9px;
    margin-bottom: 14px;
    padding: 11px 12px;
    background: var(--accent-soft);
    border-radius: 9px;
  }
  .ver-label-top {
    display: flex; align-items: center; gap: 8px;
    justify-content: space-between;
  }
  .ver-label-row .vlr-del {
    flex-shrink: 0;
    font-size: 11px;
    padding: 6px 10px;
  }
  /* AU 이름 입력칸 */
  .vlr-namebox {
    display: flex; flex-direction: column; gap: 5px;
  }
  .vlr-namebox label {

<script>  // 텍스트 데이터는 localStorage, 이미지는 IndexedDB 에 저장됩니다.
  //
  // ====== 데이터 구조 ======
  // store = { categories:[{id,name,parentId}], personas:[ persona ] }
  // persona = { id, created, versions:[ version, ... ] }
  // version = {
  //   vid, isOrig, catId, label, name, age, height, gender,
  //   tagline, chars, memo, tags, hasImg
  // }
  //   isOrig : 오리지널 여부 (true 면 전체 화면에 항상 표시)
  //            versions[0] 은 항상 true 로 강제 (캐릭터당 최소 1개 오리지널)
  //            한 캐릭터가 오리지널을 2개 이상 가질 수도 있음
  //   catId  : 카테고리. ★ 오리지널에서만 쓰임.
  //   label  : AU 이름. ★ 오리지널이 아닌 AU 에서만 쓰임.
  //            입력한 이름이 사이드바 'AU 목록'에 자동으로 모임.
  // 이미지는 IndexedDB 에 version.vid 키로 저장.
  const $ = id => document.getElementById(id);
  const STORE_KEY = 'personakeeper:data';
  const THEME_KEY = 'personakeeper:theme';
  let storageOK = true;
  try { localStorage.setItem('__t__','1'); localStorage.removeItem('__t__'); }
  catch { storageOK = false; }
  // ===== IndexedDB — AU별 이미지 저장소 =====
  const IDB_NAME = 'personakeeper';
  const IDB_STORE = 'images';
  let _idb = null;
  function idbOpen() {
    return new Promise((resolve, reject) => {
      if (_idb) { resolve(_idb); return; }
      let req;
      try { req = indexedDB.open(IDB_NAME, 1); }
      catch (e) { reject(e); return; }
      req.onupgradeneeded = () => {
        const db = req.result;
        if (!db.objectStoreNames.contains(IDB_STORE)) {
          db.createObjectStore(IDB_STORE);
        }
      };
      req.onsuccess = () => { _idb = req.result; resolve(_idb); };
      req.onerror = () => reject(req.error);
    });
  }
  function idbGet(key) {
    return idbOpen().then(db => new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE, 'readonly');
      const req = tx.objectStore(IDB_STORE).get(key);
      req.onsuccess = () => resolve(req.result || '');
      req.onerror = () => reject(req.error);
    }));
  }
  function idbSet(key, val) {
    return idbOpen().then(db => new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE, 'readwrite');
      tx.objectStore(IDB_STORE).put(val, key);
      tx.oncomplete = () => resolve(true);
      tx.onerror = () => reject(tx.error);
    }));
  }
  function idbDelete(key) {
    return idbOpen().then(db => new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE, 'readwrite');
      tx.objectStore(IDB_STORE).delete(key);
      tx.oncomplete = () => resolve(true);
      tx.onerror = () => reject(tx.error);
    }));
  }
  function idbAllKeys() {
    return idbOpen().then(db => new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE, 'readonly');
      const req = tx.objectStore(IDB_STORE).getAllKeys();
      req.onsuccess = () => resolve(req.result || []);
      req.onerror = () => reject(req.error);
    }));
  }
  const imgCache = {};
  // ===== 토스트 =====
  function toast(msg) {
    const t = $('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 1900);
  }
  // ===== 꾸민 확인 모달 (기본 confirm/alert 대체) =====
  let _confirmResolve = null;
  function uiConfirm(opts) {
    return new Promise(resolve => {
      _confirmResolve = resolve;
      $('confirmTitle').textContent = opts.title || '확인';

  // AU 사이드바 항목 드래그 — 같은 묶음끼리만 (reorderAu 가 검증)
  let dragAuKey = null;
  function attachAuDrag(el, key) {
    el.draggable = true;
    el.addEventListener('dragstart', e => {
      dragAuKey = key;
      el.classList.add('cat-dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.stopPropagation();
    });
    el.addEventListener('dragend', () => {
      el.classList.remove('cat-dragging');
      document.querySelectorAll('.ver-item.cat-drag-over').forEach(x =>
        x.classList.remove('cat-drag-over'));
    });
    el.addEventListener('dragover', e => {
      if (!dragAuKey || dragAuKey === key) return;
      // 같은 묶음(둘 다 상위 / 같은 상위의 하위)만 표시
      const aSub = dragAuKey.indexOf('\u0001') >= 0;
      const bSub = key.indexOf('\u0001') >= 0;
      if (aSub !== bSub) return;
      if (aSub && dragAuKey.split('\u0001')[0] !== key.split('\u0001')[0]) return;
      e.preventDefault();
      el.classList.add('cat-drag-over');
    });
    el.addEventListener('dragleave', () => {
      el.classList.remove('cat-drag-over');
    });
    el.addEventListener('drop', e => {
      e.preventDefault();
      e.stopPropagation();
      el.classList.remove('cat-drag-over');
      if (dragAuKey && dragAuKey !== key) reorderAu(dragAuKey, key);
    });
  }

  function areSiblings(idA, idB) {

    const b = store.categories.find(c => c.id === idB);
    if (!a || !b) return false;

  function reorderCategory(fromId, toId) {

    if (!areSiblings(fromId, toId)) return;
    const arr = store.categories;
    const fromIdx = arr.findIndex(c => c.id === fromId);
    if (fromIdx < 0) return;
    const [moved] = arr.splice(fromIdx, 1);
    // 빼낸 뒤 목표 위치를 다시 찾아 그 앞에 끼움
    const toIdx = arr.findIndex(c => c.id === toId);

  // ===== 카드 그리드 =====
  // 화면에 그릴 카드 목록 — [{ persona, version }]
  //  - 전체:    각 캐릭터의 오리지널
  //  - 미분류:  카테고리 없는 오리지널
  //  - 카테고리: 그 카테고리(+하위)를 catId 로 가진 ★오리지널★ 만
  //  - AU이름: 그 이름(label)을 가진 ★오리지널 아닌★ AU 들
  function visibleCards() {
    const q = searchText.trim().toLowerCase();
    let cards = [];
    if (curView.type === 'all') {
      store.personas.forEach(p => {
        origVersions(p).forEach(v => cards.push({ persona: p, version: v }));
      });
    } else if (curView.type === 'none') {
      store.personas.forEach(p => {
        origVersions(p).forEach(v => {
          if (!v.catId || !store.categories.find(c => c.id === v.catId)) {
            cards.push({ persona: p, version: v });
          }
        });
      });
    } else if (curView.type === 'cat') {
      const ids = categoryWithDescendants(curView.id);
      store.personas.forEach(p => {
        p.versions.forEach(v => {
          // 오리지널만 — 카테고리는 오리지널 전용
          if (v.isOrig && ids.indexOf(v.catId) >= 0) {
            cards.push({ persona: p, version: v });
          }
        });
      });
    } else if (curView.type === 'verlabel') {
      store.personas.forEach(p => {
        p.versions.forEach(v => {
          if (v.isOrig) return;
          if ((v.label || '').trim() !== curView.label) return;
          // 하위까지 선택했으면 그 하위만, 아니면 그 상위 AU 전부
          if (curView.subLabel) {
            if ((v.subLabel || '').trim() === curView.subLabel) {
              cards.push({ persona: p, version: v });
            }
          } else {
            cards.push({ persona: p, version: v });
          }
        });
      });
    }
    if (q) {
      cards = cards.filter(({ persona, version }) => {
        const o = firstOrig(persona);
        if ((version.name || '').toLowerCase().includes(q)) return true;
        if ((o.name || '').toLowerCase().includes(q)) return true;
        if ((version.tagline || '').toLowerCase().includes(q)) return true;
        if ((version.label || '').toLowerCase().includes(q)) return true;
        if ((version.chars || []).some(c => c.toLowerCase().includes(q))) return true;
        return false;
      });
    }
    return cards;
  }
  // 카테고리의 루트→현재 전체 경로 이름 ("아크 › 센티넬 › 애콜라이트")
  function categoryPathName(id) {
    const chain = [];
    let cat = store.categories.find(c => c.id === id);
    const seen = new Set();
    while (cat && !seen.has(cat.id)) {
      seen.add(cat.id);
      chain.unshift(cat.name);
      cat = cat.parentId
        ? store.categories.find(c => c.id === cat.parentId)
        : null;
    }
    return chain.join(' › ');
  }

      const path = categoryPathName(curView.id);
      return path || '전체';
    }
    if (curView.type === 'verlabel') {
      return curView.subLabel
        ? (curView.label + ' › ' + curView.subLabel)
        : curView.label;
    }
    return '전체';

  function processImageFile(file) {
    if (!file) return;
    if (!file.type || !file.type.startsWith('image/')) {
      toast('이미지만 넣을 수 있어요'); return;
    }
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const maxW = 700;
        let w = img.naturalWidth, h = img.naturalHeight;
        if (w > maxW) { h = Math.round(h * (maxW / w)); w = maxW; }
        const cv = document.createElement('canvas');
        cv.width = w; cv.height = h;
        cv.getContext('2d').drawImage(img, 0, 0, w, h);
        try { setEditImg(cv.toDataURL('image/jpeg', 0.88)); }
        catch { setEditImg(reader.result); }
        toast('이미지를 넣었어요');
      };
      img.onerror = () => setEditImg(reader.result);
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  }

      catch { toast('백업 파일을 읽을 수 없어요'); return; }
      if (!payload || payload._app !== 'personakeeper' || !payload.data) {
        toast('페르소나 보관함 백업 파일이 아니에요');
        return;
      }
      const d = payload.data;
      const cats = Array.isArray(d.categories) ? d.categories : [];
      const rawPpl = Array.isArray(d.personas) ? d.personas : [];
      const imgWrites = [];
      const newPersonas = [];
      rawPpl.forEach(rp => {
        if (!rp || typeof rp !== 'object') return;
        let persona;
        if (Array.isArray(rp.versions) && rp.versions.length) {
          const versions = rp.versions.map((rv, i) => {
            const vid = rv.vid || uid();
            const isOrig = (i === 0) ? true
              : (typeof rv.isOrig === 'boolean' ? rv.isOrig : false);
            const v = {
              vid: vid,
              isOrig: isOrig,
              catId: isOrig ? (rv.catId || '') : '',
              label: isOrig ? '' : (rv.label || ''),
              subLabel: (isOrig || !rv.label) ? '' : (rv.subLabel || ''),
              name: rv.name || '',
              age: rv.age || '',
              height: rv.height || '',
              gender: rv.gender || '',
              tagline: rv.tagline || '',
              chars: Array.isArray(rv.chars) ? rv.chars : [],
              memo: rv.memo || '',
              tags: Array.isArray(rv.tags) ? rv.tags : [],
              hasImg: !!(rv.img && rv.img.indexOf
                && rv.img.indexOf('data:') === 0)
            };
            return { v: v, img: rv.img || '' };
          });
          persona = {
            id: rp.id || uid(),
            created: rp.created || Date.now(),
            versions: versions.map(x => x.v)
          };
          versions.forEach(x => {
            if (x.img && x.img.indexOf('data:') === 0) {
              imgWrites.push({ vid: x.v.vid, img: x.img });
            }
          });
        } else {
          const vid = uid();
          const v = {
            vid: vid, isOrig: true, catId: rp.catId || '', label: '',
            name: rp.name || '', age: rp.age || '',
            height: rp.height || '', gender: rp.gender || '',
            tagline: rp.tagline || '',
            chars: Array.isArray(rp.chars) ? rp.chars : [],
            memo: rp.memo || '',
            tags: Array.isArray(rp.tags) ? rp.tags : [],
            hasImg: !!(rp.img && rp.img.indexOf
              && rp.img.indexOf('data:') === 0)
          };
          persona = {
            id: rp.id || uid(),
            created: rp.created || Date.now(),
            versions: [v]
          };
          if (rp.img && typeof rp.img === 'string'
              && rp.img.indexOf('data:') === 0) {
            imgWrites.push({ vid: vid, img: rp.img });
          }
        }
        newPersonas.push(persona);
      });
      uiConfirm({
        title: '백업 불러오기',
        message: '백업을 불러오면 지금의 캐릭터 ' + store.personas.length
          + '명이 백업 파일의 ' + newPersonas.length + '명으로 모두 바뀝니다.\n\n계속할까요?',
        okText: '불러오기'
      }).then(okay => {
        if (!okay) return;
        for (const k in imgCache) delete imgCache[k];
        const writes = [];
        imgWrites.forEach(x => {
          imgCache[x.vid] = x.img;
          writes.push(idbSet(x.vid, x.img).catch(() => {}));
        });
        idbAllKeys().then(keys => {
          const keep = {};
          newPersonas.forEach(p => p.versions.forEach(v => { keep[v.vid] = true; }));
          keys.forEach(k => { if (!keep[k]) idbDelete(k).catch(() => {}); });
        }).catch(() => {});
        Promise.all(writes).then(() => {
          store.categories = cats;
          store.personas = newPersonas;
          save();
          curView = { type: 'all' };
          searchText = '';
          $('searchInput').value = '';
          refresh();
          toast('캐릭터 ' + newPersonas.length + '명을 불러왔어요');
        });
      });
    };
    reader.onerror = () => toast('파일을 읽지 못했어요');
    reader.readAsText(file);
  });
  // ===== 시작 =====
  refresh();
  (function initStorage() {
    idbOpen().then(() => {
      const migrations = [];
      let migrated = false;
      const remapTasks = _imgKeyRemap.map(rm => {
        return idbGet(rm.from).then(val => {
          if (val) {
            imgCache[rm.to] = val;
            return idbSet(rm.to, val)
              .then(() => idbDelete(rm.from).catch(() => {}))
              .catch(() => {});
          }
        }).catch(() => {});
      });
      store.personas.forEach(p => {
        p.versions.forEach(v => {
          if (v.img && typeof v.img === 'string'
              && v.img.indexOf('data:') === 0) {
            migrated = true;
            imgCache[v.vid] = v.img;
            migrations.push(idbSet(v.vid, v.img).catch(() => {}));
            v.hasImg = true;
            delete v.img;
          }
        });
      });
      return Promise.all(remapTasks.concat(migrations)).then(() => {
        if (migrated || _imgKeyRemap.length) save();
        return idbAllKeys();
      }).then(keys => {
        const loads = keys.map(k =>
          idbGet(k).then(val => { if (val) imgCache[k] = val; }).catch(() => {}));
        return Promise.all(loads);
      });
    }).then(() => {
      refresh();
    }).catch(() => {});
  })();
</script>
</body>
