<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>페르소나 보관함</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect x='1' y='1' width='14' height='14' rx='3' fill='%232f6df0'/><circle cx='8' cy='6' r='2.6' fill='%23ffffff'/><path d='M3.5 14a4.5 4.5 0 0 1 9 0z' fill='%23ffffff'/></svg>">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<style>
  :root {
    --bg: #f1f3f7;
    --panel: #ffffff;
    --border: #dde2ea;
    --text: #41454f;
    --text-strong: #1a1d24;
    --text-dim: #858a99;
    --accent: #2f6df0;
    --accent-deep: #2258cc;
    --accent-soft: #e6eefe;
    --field: #f8f9fc;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 10px 30px rgba(0,0,0,0.06);
    --ui: 'Pretendard Variable', 'Pretendard', -apple-system, sans-serif;
  }
  [data-theme="dark"] {
    --bg: #15161c;
    --panel: #1d1e26;
    --border: #2c2e3a;
    --text: #c5c8d2;
    --text-strong: #e7e9ef;
    --text-dim: #888c9c;
    --accent: #5b9bf0;
    --accent-deep: #7db2f5;
    --accent-soft: #1d2a44;
    --field: #191a21;
    --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 10px 30px rgba(0,0,0,0.28);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

  body {
    font-family: var(--ui);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background 0.25s ease, color 0.25s ease;
  }

  /* ===== 헤더 ===== */
  header {
    height: 56px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 18px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    position: sticky; top: 0; z-index: 30;
  }
  .brand {
    display: flex; align-items: center; gap: 9px;
    font-weight: 600; font-size: 15px;
    letter-spacing: -0.02em; color: var(--text-strong);
  }
  .brand .mark {
    width: 22px; height: 22px;
    border-radius: 7px;
    background: linear-gradient(135deg, #6fb0f5, #3f6fd8);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
  }
  .brand small { color: var(--text-dim); font-weight: 400; font-size: 11px; }
  .header-actions { display: flex; gap: 7px; align-items: center; }

  button {
    font-family: var(--ui);
    font-size: 12px; font-weight: 500;
    color: var(--text);
    background: var(--field);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 7px 12px;
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
    transition: all 0.13s ease;
  }
  button:hover { border-color: var(--accent); color: var(--accent-deep); }
  button:active { transform: translateY(1px); }
  button svg { width: 14px; height: 14px; }
  button.primary {
    background: var(--accent); border-color: var(--accent); color: #fff;
  }
  button.primary:hover { opacity: 0.9; color: #fff; }
  button.icon { padding: 7px; }
  button.danger:hover { border-color: #e0556b; color: #e0556b; }

  /* ===== 레이아웃 ===== */
  main {
    display: flex;
    min-height: calc(100vh - 56px);
  }
  /* 사이드바 — 카테고리 */
  .sidebar {
    width: 220px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    background: var(--panel);
    padding: 16px 12px;
    display: flex; flex-direction: column;
    gap: 4px;
  }
  .side-title {
    font-size: 10.5px; font-weight: 600;
    letter-spacing: 0.05em; text-transform: uppercase;
    color: var(--text-dim);
    padding: 4px 8px 8px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .cat-add-btn {
    border: 0; background: transparent;
    color: var(--text-dim); font-size: 15px;
    padding: 0 4px; cursor: pointer; line-height: 1;
  }
  .cat-add-btn:hover { color: var(--accent-deep); }
  .cat-item {
    position: relative;
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.12s ease;
  }
  .cat-item:hover { background: var(--field); }
  .cat-item.active {
    background: var(--accent-soft);
    color: var(--accent-deep);
    font-weight: 600;
  }
  /* 카테고리 라벨 (화살표 + 이름) */
  .cat-item .cat-label {
    display: flex; align-items: center; gap: 6px;
    min-width: 0; overflow: hidden;
    white-space: nowrap; text-overflow: ellipsis;
  }
  /* 하위 카테고리 */
  .cat-item.cat-sub { font-size: 12px; }
  /* 대분류 — 옅은 배경으로 그룹 구분 */
  .cat-item.cat-top {
    background: var(--field);
    font-weight: 600;
  }
  .cat-item.cat-top:hover { background: var(--border); }
  .cat-item.cat-top.active {
    background: var(--accent-soft);
    color: var(--accent-deep);
  }
  /* 대분류 접기/펴기 토글 */
  .cat-item .cat-toggle {
    font-size: 9px;
    color: var(--text-dim);
    flex-shrink: 0;
    width: 11px; text-align: center;
    cursor: pointer;
  }
  .cat-item .cat-toggle:hover { color: var(--accent-deep); }
  /* 2단계 카테고리끼리 사이 — 짧고 옅은 구분선 */
  .cat-item.cat-level-line::before {
    content: "";
    position: absolute;
    top: 0; left: 14px; right: 14px;
    border-top: 1px solid var(--text-faint, rgba(0,0,0,0.06));
    opacity: 0.6;
  }
  [data-theme="dark"] .cat-item.cat-level-line::before {
    border-top-color: rgba(255,255,255,0.09);
  }
  /* "전체"와 카테고리 목록 사이 간격 */
  .cat-item.cat-all { margin-bottom: 10px; }
  /* 최상위 카테고리 사이 간격 */
  .cat-item.cat-top-divider {
    margin-top: 6px;
  }
  /* 미분류 — 맨 아래, 위에 구분선 */
  .cat-item.cat-uncat {
    margin-top: 6px;
    border-top: 1px solid var(--border);
    padding-top: 12px;
    color: var(--text-dim);
  }
  /* 카테고리 드래그 */
  .cat-item.cat-top { cursor: grab; }
  .cat-item.cat-dragging { opacity: 0.45; }
  .cat-item.cat-drag-over {
    box-shadow: inset 0 2px 0 var(--accent);
  }
  /* 하위 카테고리 — 회색 글씨 (단계 색 구분 없음) */
  .cat-item.cat-sub .cat-name { color: var(--text-dim); }
  /* 선택된 하위 카테고리는 강조색 */
  .cat-item.cat-sub.active .cat-name { color: var(--accent-deep); }
  .cat-item .cat-count {
    margin-left: auto;
    font-size: 11px;
    color: var(--text-dim);
    background: var(--field);
    border-radius: 10px;
    padding: 1px 8px;
  }
  .cat-item.active .cat-count {
    background: var(--panel);
    color: var(--accent-deep);
  }
  .cat-item .cat-del {
    margin-left: 4px;
    border: 0; background: transparent;
    color: var(--text-dim);
    font-size: 13px; cursor: pointer;
    padding: 0 2px; line-height: 1;
    display: none;
  }
  .cat-item:hover .cat-del { display: block; }
  .cat-item .cat-del:hover { color: #e0556b; }

  /* 콘텐츠 영역 */
  .content {
    flex: 1;
    padding: 22px 24px 60px;
    min-width: 0;
  }
  .content-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 18px;
    gap: 12px; flex-wrap: wrap;
  }
  .content-title {
    font-size: 18px; font-weight: 700;
    color: var(--text-strong);
    letter-spacing: -0.02em;
  }
  .content-title .ct-count {
    font-size: 13px; font-weight: 400;
    color: var(--text-dim);
    margin-left: 8px;
  }
  .search-box {
    position: relative;
  }
  .search-box input {
    font-family: var(--ui); font-size: 12.5px;
    color: var(--text); background: var(--field);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 12px 8px 30px; outline: none;
    width: 200px;
    transition: border-color 0.13s ease;
  }
  .search-box input:focus { border-color: var(--accent); }
  .search-box svg {
    position: absolute; left: 9px; top: 50%;
    transform: translateY(-50%);
    width: 14px; height: 14px; color: var(--text-dim);
  }

  /* 페르소나 카드 그리드 */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 14px;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.14s ease, box-shadow 0.14s ease, border-color 0.14s ease;
  }
  .card:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow);
    border-color: var(--accent);
  }
  /* 드래그 중 */
  .card.dragging {
    opacity: 0.45;
    cursor: grabbing;
  }
  /* 드롭 대상 표시 */
  .card.drag-over {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-soft);
    transform: scale(1.03);
  }
  .card-img {
    width: 100%;
    aspect-ratio: 1 / 1;
    background: var(--field);
    background-size: cover;
    background-position: center;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-dim);
    font-size: 30px;
  }
  .card-body { padding: 11px 13px 13px; }
  .card-name {
    font-size: 14px; font-weight: 700;
    color: var(--text-strong);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card-meta {
    font-size: 11px; color: var(--text-dim);
    margin-top: 3px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card-tagline {
    font-size: 11.5px; color: var(--text);
    margin-top: 6px;
    line-height: 1.45;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-chars {
    margin-top: 8px;
    display: flex; flex-wrap: wrap; gap: 4px;
  }
  .char-chip {
    font-size: 10px;
    background: var(--accent-soft);
    color: var(--accent-deep);
    border-radius: 9px;
    padding: 2px 7px;
    white-space: nowrap;
  }
  .char-chip.more { background: var(--field); color: var(--text-dim); }

  /* 빈 상태 */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }
  .empty .e-emoji { font-size: 40px; }
  .empty .e-title {
    font-size: 15px; font-weight: 600;
    color: var(--text);
    margin: 12px 0 5px;
  }
  .empty .e-sub { font-size: 12.5px; }
  .empty button { margin-top: 16px; }

  /* ===== 모달 ===== */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(20,20,28,0.5);
    backdrop-filter: blur(3px);
    -webkit-backdrop-filter: blur(3px);
    display: none;
    align-items: center; justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .overlay.show { display: flex; }
  .modal {
    background: var(--panel);
    border-radius: 16px;
    box-shadow: var(--shadow);
    width: 460px; max-width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    animation: pop 0.2s cubic-bezier(.22,1,.36,1);
  }
  .modal.modal-sm { width: 360px; }
  @keyframes pop {
    from { opacity: 0; transform: scale(0.96) translateY(8px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
  .modal-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 18px;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0;
    background: var(--panel);
    border-radius: 16px 16px 0 0;
  }
  .modal-head h2 {
    font-size: 14.5px; font-weight: 700;
    color: var(--text-strong);
  }
  .modal-close {
    border: 0; background: transparent;
    color: var(--text-dim); font-size: 20px;
    cursor: pointer; padding: 0 4px; line-height: 1;
  }
  .modal-close:hover { color: var(--text); }
  .modal-body { padding: 18px; }

  .field { margin-bottom: 14px; }
  .field-hint {
    font-size: 10.5px; color: var(--text-dim);
    margin-top: 5px; line-height: 1.5;
  }
  .field label {
    display: block;
    font-size: 11.5px; font-weight: 600;
    color: var(--text-dim);
    margin-bottom: 5px;
  }
  .field input[type="text"],
  .field input[type="number"],
  .field textarea,
  .field select {
    width: 100%;
    font-family: var(--ui); font-size: 12.5px;
    color: var(--text); background: var(--field);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 9px 11px; outline: none;
    transition: border-color 0.13s ease;
  }
  .field input:focus, .field textarea:focus, .field select:focus {
    border-color: var(--accent);
  }
  .field textarea { resize: vertical; min-height: 60px; line-height: 1.5; }
  .field-row { display: flex; gap: 10px; }
  .field-row .field { flex: 1; }

  /* 이미지 업로드 */
  .img-upload {
    width: 110px; height: 110px;
    border-radius: 12px;
    border: 1.5px dashed var(--border);
    background: var(--field);
    background-size: cover; background-position: center;
    cursor: pointer;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 5px;
    color: var(--text-dim);
    font-size: 11px;
    flex-shrink: 0;
    transition: border-color 0.13s ease;
  }
  .img-upload:hover { border-color: var(--accent); }
  .img-upload.has-img { border-style: solid; }
  .img-upload .iu-icon { font-size: 24px; }
  .img-row { display: flex; gap: 14px; align-items: flex-start; }
  .img-row .img-side { flex: 1; }

  /* 함께한 캐릭터 입력 */
  .char-input-row { display: flex; gap: 6px; }
  .char-input-row input { flex: 1; }
  .char-input-row button { flex-shrink: 0; }
  .char-list {
    display: flex; flex-wrap: wrap; gap: 5px;
    margin-top: 8px;
  }
  .char-tag {
    display: flex; align-items: center; gap: 5px;
    font-size: 11.5px;
    background: var(--accent-soft);
    color: var(--accent-deep);
    border-radius: 11px;
    padding: 3px 5px 3px 10px;
  }
  .char-tag button {
    border: 0; background: transparent;
    color: var(--accent-deep); cursor: pointer;
    font-size: 13px; padding: 0; line-height: 1;
    width: 15px; height: 15px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
  }
  .char-tag button:hover { background: rgba(0,0,0,0.1); }

  .modal-foot {
    display: flex; gap: 8px;
    padding: 14px 18px;
    border-top: 1px solid var(--border);
    position: sticky; bottom: 0;
    background: var(--panel);
  }
  .modal-foot .spacer { flex: 1; }

  /* 상세 보기 */
  .detail-img {
    width: 100%;
    aspect-ratio: 1 / 1;
    border-radius: 12px;
    background: var(--field);
    background-size: cover; background-position: center;
    margin-bottom: 14px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-dim); font-size: 36px;
  }
  /* 이름 + with 한 줄 */
  .detail-name-row {
    display: flex; align-items: baseline;
    flex-wrap: wrap; gap: 4px 8px;
  }
  .detail-name {
    font-size: 19px; font-weight: 800;
    color: var(--text-strong);
    letter-spacing: -0.02em;
  }
  /* 카테고리 — 이름 위 */
  .detail-cat {
    display: inline-block;
    font-size: 11px;
    background: var(--accent-soft);
    color: var(--accent-deep);
    border-radius: 9px;
    padding: 2px 9px;
    margin-bottom: 7px;
  }
  /* 한 줄 소개 — 이름 바로 아래, 라벨 없이 */
  .detail-tagline {
    font-size: 12.5px;
    color: var(--text-dim);
    line-height: 1.5;
    margin-top: 4px;
  }
  .detail-stats {
    display: flex; gap: 8px;
    margin: 14px 0;
  }
  .stat-box {
    flex: 1;
    background: var(--field);
    border-radius: 9px;
    padding: 9px 6px;
    text-align: center;
  }
  .stat-box .sb-label {
    font-size: 10px; color: var(--text-dim);
  }
  .stat-box .sb-value {
    font-size: 14px; font-weight: 700;
    color: var(--text-strong);
    margin-top: 2px;
  }
  .detail-section { margin-top: 14px; }
  /* 섹션 라벨 줄 — 라벨 + 복사 버튼 */
  .detail-section .ds-head {
    display: flex; align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
  }
  .detail-section .ds-label {
    font-size: 11px; font-weight: 600;
    color: var(--text-dim);
  }
  .detail-section .ds-copy {
    display: inline-flex; align-items: center; gap: 4px;
    font-family: var(--ui);
    font-size: 10.5px;
    color: var(--text-dim);
    background: var(--field);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px 8px; cursor: pointer;
    transition: background 0.13s ease, color 0.13s ease;
  }
  .detail-section .ds-copy svg {
    width: 11px; height: 11px;
  }
  .detail-section .ds-copy:hover {
    background: var(--border);
    color: var(--text);
  }
  .detail-section .ds-copy.copied {
    background: var(--accent); color: #fff;
    border-color: var(--accent);
  }
  /* 설정 본문 — 옅은 배경 박스 */
  .detail-section .ds-text {
    font-size: 11.5px; line-height: 1.6;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
    background: var(--field);
    border-radius: 9px;
    padding: 10px 12px;
  }
  /* 설정 글자 수 — 맨 하단 */
  .detail-charcount {
    margin-top: 8px;
    text-align: right;
    font-size: 10.5px;
    color: var(--text-dim);
  }
  .detail-chars { display: flex; flex-wrap: wrap; gap: 5px; }
  .detail-chars .char-chip {
    font-size: 11.5px;
    padding: 3px 10px;
  }
  /* with — 이름 옆에 작게 */
  .detail-with {
    display: inline-flex; align-items: baseline; gap: 5px;
  }
  .detail-with .with-label {
    font-size: 11px; font-weight: 700;
    color: var(--accent-deep);
    flex-shrink: 0;
  }
  .detail-with .with-names {
    font-size: 12px;
    color: var(--text-dim);
    word-break: break-word;
  }
  /* 태그 칩 — # 스타일 */
  .detail-chars .tag-chip {
    background: var(--accent-soft);
    color: var(--accent-deep);
    font-weight: 600;
  }

  .toast {
    position: fixed; bottom: 22px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--text-strong); color: var(--bg);
    font-size: 12.5px; font-weight: 500;
    padding: 10px 17px; border-radius: 8px;
    opacity: 0; pointer-events: none;
    transition: all 0.25s ease; z-index: 200;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 680px) {
    header { height: 50px; padding: 0 12px; }
    .brand small { display: none; }
    main { flex-direction: column; }
    .sidebar {
      width: 100%;
      border-right: 0;
      border-bottom: 1px solid var(--border);
      flex-direction: row;
      overflow-x: auto;
      padding: 10px 12px;
      gap: 6px;
    }
    .side-title { display: none; }
    .cat-item { flex-shrink: 0; white-space: nowrap; }
    .cat-item .cat-del { display: none !important; }
    .content { padding: 16px 14px 50px; }
    .search-box input { width: 140px; }
  }
</style>
</head>
<body data-theme="light">

<header>
  <div class="brand">

<div class="toast" id="toast"></div>

<script>
  // 텍스트 데이터는 localStorage, 이미지는 IndexedDB 에 저장됩니다.
  // (localStorage 는 약 5MB 한도라 이미지가 많으면 부족 — IndexedDB 는 훨씬 큼)
  const $ = id => document.getElementById(id);
  const STORE_KEY = 'personakeeper:data';
  const THEME_KEY = 'personakeeper:theme';

  let storageOK = true;
  try { localStorage.setItem('__t__','1'); localStorage.removeItem('__t__'); }
  catch { storageOK = false; }

  // ===== IndexedDB — 캐릭터 이미지 저장소 =====
  // store: 'images', key = persona id, value = base64 data URL
  const IDB_NAME = 'personakeeper';
  const IDB_STORE = 'images';
  let _idb = null;
  function idbOpen() {
    return new Promise((resolve, reject) => {
      if (_idb) { resolve(_idb); return; }
      let req;
      try { req = indexedDB.open(IDB_NAME, 1); }
      catch (e) { reject(e); return; }
      req.onupgradeneeded = () => {
        const db = req.result;
        if (!db.objectStoreNames.contains(IDB_STORE)) {
          db.createObjectStore(IDB_STORE);
        }
      };
      req.onsuccess = () => { _idb = req.result; resolve(_idb); };
      req.onerror = () => reject(req.error);
    });
  }
  function idbGet(key) {
    return idbOpen().then(db => new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE, 'readonly');
      const req = tx.objectStore(IDB_STORE).get(key);
      req.onsuccess = () => resolve(req.result || '');
      req.onerror = () => reject(req.error);
    }));
  }
  function idbSet(key, val) {
    return idbOpen().then(db => new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE, 'readwrite');
      tx.objectStore(IDB_STORE).put(val, key);
      tx.oncomplete = () => resolve(true);
      tx.onerror = () => reject(tx.error);
    }));
  }
  function idbDelete(key) {
    return idbOpen().then(db => new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE, 'readwrite');
      tx.objectStore(IDB_STORE).delete(key);
      tx.oncomplete = () => resolve(true);
      tx.onerror = () => reject(tx.error);
    }));
  }
  function idbAllKeys() {
    return idbOpen().then(db => new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE, 'readonly');
      const req = tx.objectStore(IDB_STORE).getAllKeys();
      req.onsuccess = () => resolve(req.result || []);
      req.onerror = () => reject(req.error);
    }));
  }
  // 메모리 이미지 캐시 — id → base64 (화면 그릴 때 동기 접근용)
  const imgCache = {};

  // ===== 토스트 =====
  function toast(msg) {
    const t = $('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 1900);
  }

  // ===== 데이터 =====
  // localStorage: { categories:[{id,name,parentId}],
  //   personas:[{id,name,catId,age,height,gender,tagline,chars,memo,tags,
  //              hasImg,created}] }   ← 이미지 자체는 IndexedDB 에
  let store = { categories: [], personas: [] };
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) {
      const p = JSON.parse(raw);
      if (p && typeof p === 'object') {
        store.categories = Array.isArray(p.categories) ? p.categories : [];
        store.personas = Array.isArray(p.personas) ? p.personas : [];
      }
    }
  } catch {}
  function save() {
    if (!storageOK) { toast('브라우저 저장이 막혀 있어요'); return false; }
    try {
      // 저장 전 — 이미지 필드는 빼고 hasImg 플래그만 (이미지는 IndexedDB)
      const lean = {
        categories: store.categories,
        personas: store.personas.map(p => {
          const c = {};
          for (const k in p) { if (k !== 'img') c[k] = p[k]; }
          return c;
        })
      };
      localStorage.setItem(STORE_KEY, JSON.stringify(lean));
      return true;
    } catch (err) {
      toast('저장 공간이 가득 찼어요');
      alert(
        '브라우저의 텍스트 저장 공간이 가득 찼어요.\n\n'
        + '이미지는 별도 저장소(IndexedDB)에 저장되니 보통은 텍스트가\n'
        + '이렇게 차는 일은 드물어요. 캐릭터 수가 아주 많다면\n'
        + '상단 저장(↓) 버튼으로 백업해 두는 걸 권해요.\n\n'
        + '※ 이번 변경 내용은 저장되지 않았어요.'
      );
      return false;
    }
  }
  const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);

  // 현재 보고 있는 카테고리 ('all' = 전체)
  let curCat = 'all';
  let searchText = '';
  // 접혀 있는 대분류 id 집합
  const COLLAPSE_KEY = 'personakeeper:collapsed';
  let collapsedCats = new Set();
  try {
    const raw = localStorage.getItem(COLLAPSE_KEY);
    if (raw) {
      const arr = JSON.parse(raw);
      if (Array.isArray(arr)) collapsedCats = new Set(arr);
    }
  } catch {}
  function saveCollapsed() {
    try {
      localStorage.setItem(COLLAPSE_KEY,
        JSON.stringify(Array.from(collapsedCats)));
    } catch {}
  }

  // ===== 카테고리 =====
  // 한 카테고리의 직속 하위 카테고리들
  // (parentId 없음/'' = 최상위)
  function childCategories(parentId) {
    if (!parentId) {
      return store.categories.filter(c => !c.parentId
        || !store.categories.find(x => x.id === c.parentId));
    }
    return store.categories.filter(c => c.parentId === parentId);
  }
  // 카테고리 + 그 하위 전체의 id 목록
  function categoryWithDescendants(id) {
    const ids = [id];
    childCategories(id).forEach(c => {
      ids.push.apply(ids, categoryWithDescendants(c.id));
    });
    return ids;
  }
  // 카테고리(+하위)에 속한 캐릭터 수
  function countInCategory(id) {
    const ids = categoryWithDescendants(id);
    return store.personas.filter(p => ids.indexOf(p.catId) >= 0).length;
  }
  // 카테고리의 최상위(대분류)를 찾음 — parentId 를 따라 올라감
  function topCategoryOf(id) {
    let cat = store.categories.find(c => c.id === id);
    if (!cat) return null;
    const seen = new Set();
    while (cat.parentId && !seen.has(cat.id)) {
      seen.add(cat.id);
      const parent = store.categories.find(c => c.id === cat.parentId);
      if (!parent) break;
      cat = parent;
    }
    return cat;
  }
  function renderCategories() {
    const wrap = $('catList');
    wrap.innerHTML = '';
    // 전체
    const all = document.createElement('div');
    all.className = 'cat-item cat-all' + (curCat === 'all' ? ' active' : '');
    all.innerHTML = '<span>전체</span>';
    const allCount = document.createElement('span');
    allCount.className = 'cat-count';
    allCount.textContent = store.personas.length;
    all.appendChild(allCount);
    all.addEventListener('click', () => { curCat = 'all'; refresh(); });
    wrap.appendChild(all);
    // 사용자 카테고리 — 트리 구조 (단계는 색·세로바로 구분)
    let firstTopDone = false;
    function renderCatLevel(parentId, depth) {
      const kids = childCategories(parentId);
      kids.forEach((cat, idx) => {
        const item = document.createElement('div');
        item.className = 'cat-item' + (curCat === cat.id ? ' active' : '');
        const hasKids = childCategories(cat.id).length > 0;
        if (depth === 0) {
          item.classList.add('cat-top');
          if (firstTopDone) item.classList.add('cat-top-divider');
          firstTopDone = true;
          // 최상위 카테고리만 드래그로 순서 변경
          item.draggable = true;
          item.dataset.catId = cat.id;
          item.addEventListener('dragstart', e => {
            dragCatId = cat.id;
            item.classList.add('cat-dragging');
            e.dataTransfer.effectAllowed = 'move';
          });
          item.addEventListener('dragend', () => {
            item.classList.remove('cat-dragging');
            document.querySelectorAll('.cat-item.cat-drag-over').forEach(c =>
              c.classList.remove('cat-drag-over'));
          });
          item.addEventListener('dragover', e => {
            e.preventDefault();
            if (dragCatId && dragCatId !== cat.id) {
              item.classList.add('cat-drag-over');
            }
          });
          item.addEventListener('dragleave', () => {
            item.classList.remove('cat-drag-over');
          });
          item.addEventListener('drop', e => {
            e.preventDefault();
            item.classList.remove('cat-drag-over');
            if (dragCatId && dragCatId !== cat.id) {
              reorderCategory(dragCatId, cat.id);
            }
          });
        }
        if (depth > 0) {
          item.classList.add('cat-sub');
        }
        // 2단계 카테고리끼리 사이에 구분선 (첫 2단계 제외)
        if (depth === 1 && idx > 0) item.classList.add('cat-level-line');
        // 들여쓰기는 1·2단계까지만 (3단계부터는 들여쓰기 없음)
        item.style.paddingLeft = (10 + Math.min(depth, 2) * 12) + 'px';
        const label = document.createElement('span');
        label.className = 'cat-label';
        // 대분류이고 하위가 있으면 — 접기/펴기 토글
        const collapsed = collapsedCats.has(cat.id);
        if (depth === 0 && hasKids) {
          const tog = document.createElement('span');
          tog.className = 'cat-toggle';
          tog.textContent = collapsed ? '▸' : '▾';
          tog.addEventListener('click', e => {
            e.stopPropagation();
            if (collapsedCats.has(cat.id)) collapsedCats.delete(cat.id);
            else collapsedCats.add(cat.id);
            saveCollapsed();
            renderCategories();
          });
          label.appendChild(tog);
        }
        const txt = document.createElement('span');
        txt.className = 'cat-name';
        txt.textContent = cat.name;
        label.appendChild(txt);
        item.appendChild(label);
        const count = document.createElement('span');
        count.className = 'cat-count';
        count.textContent = countInCategory(cat.id);
        item.appendChild(count);
        const del = document.createElement('button');
        del.className = 'cat-del';
        del.textContent = '×';
        del.title = '카테고리 삭제';
        del.addEventListener('click', e => {
          e.stopPropagation();
          deleteCategory(cat.id);
        });
        item.appendChild(del);
        item.addEventListener('click', () => { curCat = cat.id; refresh(); });
        wrap.appendChild(item);
        // 하위 카테고리 재귀 — 대분류가 접혀 있으면 건너뜀
        if (!(depth === 0 && collapsed)) {
          renderCatLevel(cat.id, depth + 1);
        }
      });
    }
    renderCatLevel(undefined, 0);
    // 미분류 — 맨 아래
    const hasUncat = store.personas.some(p => !p.catId
      || !store.categories.find(c => c.id === p.catId));
    if (hasUncat) {
      const un = document.createElement('div');
      un.className = 'cat-item cat-uncat' + (curCat === 'none' ? ' active' : '');
      un.innerHTML = '<span>미분류</span>';
      const c = document.createElement('span');
      c.className = 'cat-count';
      c.textContent = store.personas.filter(p => !p.catId
        || !store.categories.find(cc => cc.id === p.catId)).length;
      un.appendChild(c);
      un.addEventListener('click', () => { curCat = 'none'; refresh(); });
      wrap.appendChild(un);
    }
  }
  // 최상위 카테고리 순서 변경 — fromId 를 toId 앞으로
  let dragCatId = null;
  function reorderCategory(fromId, toId) {
    const arr = store.categories;
    const fromIdx = arr.findIndex(c => c.id === fromId);
    if (fromIdx < 0) return;
    const [moved] = arr.splice(fromIdx, 1);
    const toIdx = arr.findIndex(c => c.id === toId);
    if (toIdx < 0) { arr.push(moved); }
    else { arr.splice(toIdx, 0, moved); }
    save();
    renderCategories();
  }
  // ----- 카테고리 추가 모달 -----
  function openCatModal() {
    $('catNameInput').value = '';
    // 상위 카테고리 선택칸 채우기 (최상위 + 1단계 하위까지만 부모 가능)
    const sel = $('catParentSelect');
    sel.innerHTML = '';
    const none = document.createElement('option');
    none.value = '';
    none.textContent = '— 없음 (최상위) —';
    sel.appendChild(none);
    // 모든 카테고리를 상위 후보로 (깊이 제한 없음)
    function addOpts(parentId, depth) {
      childCategories(parentId).forEach(c => {
        const o = document.createElement('option');
        o.value = c.id;
        o.textContent = '· '.repeat(depth) + c.name;
        sel.appendChild(o);
        addOpts(c.id, depth + 1);
      });
    }
    addOpts(undefined, 0);
    // 현재 보고 있는 카테고리가 있으면 그걸 상위 기본값으로
    if (curCat !== 'all' && curCat !== 'none'
        && store.categories.find(c => c.id === curCat)) {
      sel.value = curCat;
    }
    $('catOverlay').classList.add('show');
    setTimeout(() => $('catNameInput').focus(), 50);
  }
  function closeCatModal() { $('catOverlay').classList.remove('show'); }
  function saveCategory() {
    const name = $('catNameInput').value.trim();
    if (!name) { toast('이름을 입력해주세요'); $('catNameInput').focus(); return; }
    const parentId = $('catParentSelect').value || '';
    // 같은 상위 아래 같은 이름 방지
    const dup = store.categories.some(c =>
      c.name === name && (c.parentId || '') === parentId);
    if (dup) { toast('같은 이름의 카테고리가 있어요'); return; }
    const cat = { id: uid(), name: name };
    if (parentId) cat.parentId = parentId;
    store.categories.push(cat);
    save();
    closeCatModal();
    refresh();

  function deleteCategory(id) {
    const cat = store.categories.find(c => c.id === id);
    if (!cat) return;
    // 이 카테고리 + 모든 하위
    const ids = categoryWithDescendants(id);
    const subCount = ids.length - 1;
    const n = store.personas.filter(p => ids.indexOf(p.catId) >= 0).length;
    let msg = '"' + cat.name + '" 카테고리를 삭제할까요?';
    if (subCount > 0) msg += '\n하위 카테고리 ' + subCount + '개도 함께 삭제돼요.';
    if (n > 0) msg += '\n안에 있던 캐릭터 ' + n + '명은 미분류로 이동합니다.';
    if (!confirm(msg)) return;
    store.categories = store.categories.filter(c => ids.indexOf(c.id) < 0);
    store.personas.forEach(p => {
      if (ids.indexOf(p.catId) >= 0) p.catId = '';
    });
    if (ids.indexOf(curCat) >= 0) curCat = 'all';
    save();
    refresh();
    toast('카테고리를 삭제했어요');
  }

  // ===== 페르소나 카드 그리드 =====
  function visiblePersonas() {
    let list = store.personas.slice();
    // 카테고리 필터
    if (curCat === 'none') {
      list = list.filter(p => !p.catId
        || !store.categories.find(c => c.id === p.catId));
    } else if (curCat !== 'all') {
      // 선택한 카테고리 + 그 하위 카테고리에 속한 캐릭터 모두
      const ids = categoryWithDescendants(curCat);
      list = list.filter(p => ids.indexOf(p.catId) >= 0);
    }
    // 검색
    const q = searchText.trim().toLowerCase();
    if (q) {
      list = list.filter(p => {
        if ((p.name || '').toLowerCase().includes(q)) return true;
        if ((p.tagline || '').toLowerCase().includes(q)) return true;
        return (p.chars || []).some(c => c.toLowerCase().includes(q));
      });
    }
    // store.personas 배열 순서 그대로 — 드래그로 순서 변경 가능
    return list;
  }

      const body = document.createElement('div');

      name.className = 'card-name';

      const metaParts = [];
      if (p.age) metaParts.push(p.age + '세');
      if (p.gender) metaParts.push(p.gender);
      if (p.height) metaParts.push(p.height);
      if (metaParts.length) {
        const meta = document.createElement('div');
        meta.className = 'card-meta';
        meta.textContent = metaParts.join(' · ');
        body.appendChild(meta);
      }
      if (p.tagline) {
        const tag = document.createElement('div');
        tag.className = 'card-tagline';
        tag.textContent = p.tagline;
        body.appendChild(tag);
      }
      if (p.chars && p.chars.length) {
        const chars = document.createElement('div');
        chars.className = 'card-chars';
        p.chars.slice(0, 3).forEach(c => {
          const chip = document.createElement('span');
          chip.className = 'char-chip';
          chip.textContent = c;
          chars.appendChild(chip);
        });
        if (p.chars.length > 3) {

          more.className = 'char-chip more';
          more.textContent = '+' + (p.chars.length - 3);
          chars.appendChild(more);
        }
        body.appendChild(chars);
      }

      card.appendChild(img);
      card.appendChild(body);
      card.dataset.pid = p.id;
      card.draggable = true;
      card.addEventListener('click', () => {
        if (card._dragged) { card._dragged = false; return; }
        openDetail(p.id);
      });
      // ----- 드래그로 순서 변경 -----
      card.addEventListener('dragstart', e => {
        dragPid = p.id;
        card.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
      });
      card.addEventListener('dragend', () => {
        card.classList.remove('dragging');
        card._dragged = true;   // 드래그 직후 click 으로 상세 안 열리게
        document.querySelectorAll('.card.drag-over').forEach(c =>
          c.classList.remove('drag-over'));
      });
      card.addEventListener('dragover', e => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        if (p.id !== dragPid) card.classList.add('drag-over');
      });
      card.addEventListener('dragleave', () => {
        card.classList.remove('drag-over');
      });
      card.addEventListener('drop', e => {
        e.preventDefault();
        card.classList.remove('drag-over');
        if (!dragPid || dragPid === p.id) return;
        reorderPersona(dragPid, p.id);
      });
      grid.appendChild(card);
    });
  }
  // store.personas 에서 fromId 를 toId 앞 위치로 이동
  let dragPid = null;
  function reorderPersona(fromId, toId) {
    const arr = store.personas;
    const fromIdx = arr.findIndex(x => x.id === fromId);
    let toIdx = arr.findIndex(x => x.id === toId);
    if (fromIdx < 0 || toIdx < 0) return;
    const [moved] = arr.splice(fromIdx, 1);
    toIdx = arr.findIndex(x => x.id === toId);   // splice 후 재계산
    arr.splice(toIdx, 0, moved);
    save();
    renderGrid();
  }

  function fillCategorySelect(selectedId) {
    const sel = $('fCategory');
    sel.innerHTML = '';
    const none = document.createElement('option');
    none.value = '';
    none.textContent = '— 미분류 —';
    sel.appendChild(none);
    // 최상위 카테고리들 — 각각을 그룹으로 묶어 분류가 잘 보이게
    childCategories(undefined).forEach(top => {
      const subs = childCategories(top.id);
      if (subs.length === 0) {
        // 하위 없는 최상위 — 그냥 옵션
        const o = document.createElement('option');
        o.value = top.id;
        o.textContent = top.name;
        sel.appendChild(o);
        return;
      }
      // 하위가 있으면 optgroup 으로
      const grp = document.createElement('optgroup');
      grp.label = top.name;
      // 최상위 자신도 선택 가능하게 첫 옵션으로
      const selfOpt = document.createElement('option');
      selfOpt.value = top.id;
      selfOpt.textContent = top.name + ' (전체)';
      grp.appendChild(selfOpt);
      // 하위들 — 깊이는 · 로 표시
      function addSubs(parentId, depth) {
        childCategories(parentId).forEach(c => {
          const o = document.createElement('option');
          o.value = c.id;
          o.textContent = '· '.repeat(depth) + c.name;
          grp.appendChild(o);
          addSubs(c.id, depth + 1);

      sel.appendChild(grp);

  // 칩 목록 렌더 (with 캐릭터·태그 공용) — arr 에서 i 삭제 후 다시 그림

  // 이미지 업로드
  $('imgUpload').addEventListener('click', () => $('imgFile').click());
  $('imgFile').addEventListener('change', e => {
    const file = e.target.files && e.target.files[0];
    e.target.value = '';
    if (!file) return;
    if (!file.type.startsWith('image/')) { toast('이미지 파일만 가능해요'); return; }
    // 큰 이미지는 줄여서 저장 (용량 절약)
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const maxW = 700;
        let w = img.naturalWidth, h = img.naturalHeight;
        if (w > maxW) { h = Math.round(h * (maxW / w)); w = maxW; }
        const cv = document.createElement('canvas');
        cv.width = w; cv.height = h;
        cv.getContext('2d').drawImage(img, 0, 0, w, h);
        try { setEditImg(cv.toDataURL('image/jpeg', 0.88)); }
        catch { setEditImg(reader.result); }
      };
      img.onerror = () => setEditImg(reader.result);
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });

  // 태그 섹션 — 라벨 없이, 각 태그 앞에 #
  function makeTagSection(arr) {
    const sec = document.createElement('div');
    sec.className = 'detail-section';
    const chips = document.createElement('div');
    chips.className = 'detail-chars';
    arr.forEach(c => {

  function makeSection(label, text) {
    const sec = document.createElement('div');
    sec.className = 'detail-section';
    // 라벨 줄 — 라벨 + 복사 버튼
    const head = document.createElement('div');
    head.className = 'ds-head';
    const l = document.createElement('span');
    l.className = 'ds-label';
    l.textContent = label;
    head.appendChild(l);
    const copyBtn = document.createElement('button');
    copyBtn.className = 'ds-copy';
    // 복사 아이콘(SVG) + 텍스트
    const copyIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" '
      + 'stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'
      + '<rect x="9" y="9" width="13" height="13" rx="2"/>'
      + '<path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
    const checkIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" '
      + 'stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">'
      + '<polyline points="20 6 9 17 4 12"/></svg>';
    copyBtn.innerHTML = copyIcon + '<span class="ds-copy-tx">copy</span>';
    copyBtn.addEventListener('click', () => {
      const done = () => {
        copyBtn.innerHTML = checkIcon + '<span class="ds-copy-tx">copied!</span>';
        copyBtn.classList.add('copied');
        setTimeout(() => {
          copyBtn.innerHTML = copyIcon + '<span class="ds-copy-tx">copy</span>';
          copyBtn.classList.remove('copied');
        }, 1400);
      };
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(done, () => {
          fallbackCopy(text); done();
        });
      } else {
        fallbackCopy(text); done();
      }
    });
    head.appendChild(copyBtn);
    sec.appendChild(head);
    // 메모 본문 — 옅은 배경 박스
    const t = document.createElement('div');
    t.className = 'ds-text';
    t.textContent = text;
    sec.appendChild(t);
    return sec;
  }
  // clipboard API 안 될 때용 폴백
  function fallbackCopy(text) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); } catch {}
    document.body.removeChild(ta);
  }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"]/g, ch => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'
    }[ch]));
  }
  $('detailClose').addEventListener('click', () => {
    $('detailOverlay').classList.remove('show');
  });
  $('detailEdit').addEventListener('click', () => {
    $('detailOverlay').classList.remove('show');
    openEdit(detailId);
  });

  // 오버레이 바깥 클릭 시 닫기
  [['editOverlay', closeEdit],
   ['detailOverlay', () => $('detailOverlay').classList.remove('show')]
  ].forEach(pair => {
    $(pair[0]).addEventListener('click', e => {
      if (e.target === $(pair[0])) pair[1]();
    });
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      closeEdit();
      $('detailOverlay').classList.remove('show');
    }
  });

  // ===== 테마 =====
  const sun = '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>';
  const moon = '<path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/>';
  function applyTheme(t) {
    document.body.dataset.theme = t;
    $('themeIcon').innerHTML = t === 'dark' ? moon : sun;
  }
  applyTheme(localStorage.getItem(THEME_KEY) || 'light');
  $('themeBtn').addEventListener('click', () => {
    const next = document.body.dataset.theme === 'dark' ? 'light' : 'dark';
    applyTheme(next);
    try { localStorage.setItem(THEME_KEY, next); } catch {}
  });

  // ===== 저장 / 불러오기 (백업) =====
  // 백업 파일에는 이미지도 함께 담깁니다 (파일은 용량 제한 없음).
  $('exportBtn').addEventListener('click', () => {
    // personas 에 이미지(img)를 다시 합쳐서 내보냄
    const personasWithImg = store.personas.map(p => {
      const c = {};
      for (const k in p) { if (k !== 'hasImg') c[k] = p[k]; }
      if (imgCache[p.id]) c.img = imgCache[p.id];
      return c;
    });
    const payload = {
      _app: 'personakeeper',
      _version: 2,
      _exportedAt: new Date().toISOString(),
      data: { categories: store.categories, personas: personasWithImg }
    };
    let json;
    try { json = JSON.stringify(payload); }
    catch { toast('백업 생성에 실패했어요'); return; }
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const d = new Date();
    const pad = n => String(n).padStart(2, '0');
    a.href = url;
    a.download = '페르소나보관함-' + d.getFullYear()
      + pad(d.getMonth() + 1) + pad(d.getDate()) + '.json';
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    toast('캐릭터 ' + store.personas.length + '명을 파일로 저장했어요');
  });
  $('importBtn').addEventListener('click', () => $('restoreFile').click());
  $('restoreFile').addEventListener('change', e => {
    const file = e.target.files && e.target.files[0];
    e.target.value = '';
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      let payload;
      try { payload = JSON.parse(reader.result); }
      catch { toast('백업 파일을 읽을 수 없어요'); return; }
      if (!payload || payload._app !== 'personakeeper' || !payload.data) {
        toast('페르소나 보관함 백업 파일이 아니에요');
        return;
      }
      const d = payload.data;
      const cats = Array.isArray(d.categories) ? d.categories : [];
      const ppl = Array.isArray(d.personas) ? d.personas : [];
      if (!confirm('백업을 불러오면 지금의 캐릭터 ' + store.personas.length
        + '명이 백업 파일의 ' + ppl.length + '명으로 모두 바뀝니다.\n\n계속할까요?')) {
        return;
      }
      // 기존 IndexedDB 이미지 비우고, 백업의 이미지를 IndexedDB 로
      const imgWrites = [];
      // 이전 이미지 캐시 초기화
      for (const k in imgCache) delete imgCache[k];
      const cleanPersonas = ppl.map(p => {
        const c = {};
        for (const k in p) { if (k !== 'img') c[k] = p[k]; }
        if (p.img && typeof p.img === 'string' && p.img.indexOf('data:') === 0) {
          c.hasImg = true;
          imgCache[p.id] = p.img;
          imgWrites.push(idbSet(p.id, p.img).catch(() => {}));
        } else {
          c.hasImg = false;
        }
        return c;
      });
      // 기존 IndexedDB 이미지 중 백업에 없는 것 정리
      idbAllKeys().then(keys => {
        const keepIds = {};
        cleanPersonas.forEach(p => { keepIds[p.id] = true; });
        keys.forEach(k => { if (!keepIds[k]) idbDelete(k).catch(() => {}); });
      }).catch(() => {});
      Promise.all(imgWrites).then(() => {
        store.categories = cats;
        store.personas = cleanPersonas;
        save();
        curCat = 'all';
        searchText = '';
        $('searchInput').value = '';
        refresh();
        toast('캐릭터 ' + cleanPersonas.length + '명을 불러왔어요');
      });
    };
    reader.onerror = () => toast('파일을 읽지 못했어요');
    reader.readAsText(file);
  });

  // ===== 시작 =====
  // 1) 일단 화면을 한 번 그림 (이미지는 아직 없을 수 있음)
  refresh();
  // 2) IndexedDB 준비 → 기존 localStorage 이미지 마이그레이션 → 캐시 로드
  (function initStorage() {
    idbOpen().then(() => {
      // (a) 기존 데이터에 img(base64)가 박혀 있으면 IndexedDB 로 옮김
      const migrations = [];
      let migrated = false;
      store.personas.forEach(p => {
        if (p.img && typeof p.img === 'string' && p.img.indexOf('data:') === 0) {
          migrated = true;
          imgCache[p.id] = p.img;
          migrations.push(idbSet(p.id, p.img).catch(() => {}));
          p.hasImg = true;
          delete p.img;
        }
      });
      return Promise.all(migrations).then(() => {
        if (migrated) save();   // 이미지 뺀 가벼운 버전으로 다시 저장
        // (b) IndexedDB 에 있는 모든 이미지를 캐시에 로드
        return idbAllKeys();
      }).then(keys => {
        const loads = keys.map(k =>
          idbGet(k).then(v => { if (v) imgCache[k] = v; }).catch(() => {}));
        return Promise.all(loads);
      });
    }).then(() => {
      refresh();   // 이미지까지 갖춘 상태로 다시 그림
    }).catch(() => {
      // IndexedDB 가 아예 안 되는 환경 — 기존처럼 동작 (이미지는 그 세션만)
    });
  })();
</script>
</body>
</html>
