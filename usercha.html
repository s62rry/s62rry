<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>페르소나 보관함</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect x='1' y='1' width='14' height='14' rx='3' fill='%232f6df0'/><circle cx='8' cy='6' r='2.6' fill='%23ffffff'/><path d='M3.5 14a4.5 4.5 0 0 1 9 0z' fill='%23ffffff'/></svg>">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<style>
  :root {
    --bg: #f1f3f7;
    --panel: #ffffff;
    --border: #dde2ea;
    --text: #41454f;
    --text-strong: #1a1d24;
    --text-dim: #858a99;
    --accent: #2f6df0;
    --accent-deep: #2258cc;
    --accent-soft: #e6eefe;
    --field: #f8f9fc;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 10px 30px rgba(0,0,0,0.06);
    --ui: 'Pretendard Variable', 'Pretendard', -apple-system, sans-serif;
  }
  [data-theme="dark"] {
    --bg: #15161c;
    --panel: #1d1e26;
    --border: #2c2e3a;
    --text: #c5c8d2;
    --text-strong: #e7e9ef;
    --text-dim: #888c9c;
    --accent: #5b9bf0;
    --accent-deep: #7db2f5;
    --accent-soft: #1d2a44;
    --field: #191a21;
    --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 10px 30px rgba(0,0,0,0.28);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

  body {
    font-family: var(--ui);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background 0.25s ease, color 0.25s ease;
  }

  /* ===== 헤더 ===== */
  header {
    height: 56px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 18px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    position: sticky; top: 0; z-index: 30;
  }
  .brand {
    display: flex; align-items: center; gap: 9px;
    font-weight: 600; font-size: 15px;
    letter-spacing: -0.02em; color: var(--text-strong);
  }
  .brand .mark {
    width: 22px; height: 22px;
    border-radius: 7px;
    background: linear-gradient(135deg, #6fb0f5, #3f6fd8);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
  }
  .brand small { color: var(--text-dim); font-weight: 400; font-size: 11px; }
  .header-actions { display: flex; gap: 7px; align-items: center; }

  button {
    font-family: var(--ui);
    font-size: 12px; font-weight: 500;
    color: var(--text);
    background: var(--field);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 7px 12px;
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
    transition: all 0.13s ease;
  }
  button:hover { border-color: var(--accent); color: var(--accent-deep); }
  button:active { transform: translateY(1px); }
  button svg { width: 14px; height: 14px; }
  button.primary {
    background: var(--accent); border-color: var(--accent); color: #fff;
  }
  button.primary:hover { opacity: 0.9; color: #fff; }
  button.icon { padding: 7px; }
  button.danger:hover { border-color: #e0556b; color: #e0556b; }

  /* ===== 레이아웃 ===== */
  main {
    display: flex;
    min-height: calc(100vh - 56px);
  }
  /* 사이드바 — 카테고리 */
  .sidebar {
    width: 220px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    background: var(--panel);
    padding: 16px 12px;
    display: flex; flex-direction: column;
    gap: 4px;
  }
  .side-title {
    font-size: 10.5px; font-weight: 600;
    letter-spacing: 0.05em; text-transform: uppercase;
    color: var(--text-dim);
    padding: 4px 8px 8px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .cat-add-btn {
    border: 0; background: transparent;
    color: var(--text-dim); font-size: 15px;
    padding: 0 4px; cursor: pointer; line-height: 1;
  }
  .cat-add-btn:hover { color: var(--accent-deep); }
  .cat-item {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.12s ease;
  }
  .cat-item:hover { background: var(--field); }
  .cat-item.active {
    background: var(--accent-soft);
    color: var(--accent-deep);
    font-weight: 600;
  }
  .cat-item .cat-count {
    margin-left: auto;
    font-size: 11px;
    color: var(--text-dim);
    background: var(--field);
    border-radius: 10px;
    padding: 1px 8px;
  }
  .cat-item.active .cat-count {
    background: var(--panel);
    color: var(--accent-deep);
  }
  .cat-item .cat-del {
    margin-left: 4px;
    border: 0; background: transparent;
    color: var(--text-dim);
    font-size: 13px; cursor: pointer;
    padding: 0 2px; line-height: 1;
    display: none;
  }
  .cat-item:hover .cat-del { display: block; }
  .cat-item .cat-del:hover { color: #e0556b; }

  /* 콘텐츠 영역 */
  .content {
    flex: 1;
    padding: 22px 24px 60px;
    min-width: 0;
  }
  .content-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 18px;
    gap: 12px; flex-wrap: wrap;
  }
  .content-title {
    font-size: 18px; font-weight: 700;
    color: var(--text-strong);
    letter-spacing: -0.02em;
  }
  .content-title .ct-count {
    font-size: 13px; font-weight: 400;
    color: var(--text-dim);
    margin-left: 8px;
  }
  .search-box {
    position: relative;
  }
  .search-box input {
    font-family: var(--ui); font-size: 12.5px;
    color: var(--text); background: var(--field);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 12px 8px 30px; outline: none;
    width: 200px;
    transition: border-color 0.13s ease;
  }
  .search-box input:focus { border-color: var(--accent); }
  .search-box svg {
    position: absolute; left: 9px; top: 50%;
    transform: translateY(-50%);
    width: 14px; height: 14px; color: var(--text-dim);
  }

  /* 페르소나 카드 그리드 */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 14px;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.14s ease, box-shadow 0.14s ease, border-color 0.14s ease;
  }
  .card:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow);
    border-color: var(--accent);
  }
  /* 드래그 중 */
  .card.dragging {
    opacity: 0.45;
    cursor: grabbing;
  }
  /* 드롭 대상 표시 */
  .card.drag-over {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-soft);
    transform: scale(1.03);
  }
  .card-img {
    width: 100%;
    aspect-ratio: 1 / 1;
    background: var(--field);
    background-size: cover;
    background-position: center;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-dim);
    font-size: 30px;
  }
  .card-body { padding: 11px 13px 13px; }
  .card-name {
    font-size: 14px; font-weight: 700;
    color: var(--text-strong);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card-meta {
    font-size: 11px; color: var(--text-dim);
    margin-top: 3px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card-tagline {
    font-size: 11.5px; color: var(--text);
    margin-top: 6px;
    line-height: 1.45;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-chars {
    margin-top: 8px;
    display: flex; flex-wrap: wrap; gap: 4px;
  }
  .char-chip {
    font-size: 10px;
    background: var(--accent-soft);
    color: var(--accent-deep);
    border-radius: 9px;
    padding: 2px 7px;
    white-space: nowrap;
  }
  .char-chip.more { background: var(--field); color: var(--text-dim); }

  /* 빈 상태 */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }
  .empty .e-emoji { font-size: 40px; }
  .empty .e-title {
    font-size: 15px; font-weight: 600;
    color: var(--text);
    margin: 12px 0 5px;
  }
  .empty .e-sub { font-size: 12.5px; }
  .empty button { margin-top: 16px; }

  /* ===== 모달 ===== */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(20,20,28,0.5);
    backdrop-filter: blur(3px);
    -webkit-backdrop-filter: blur(3px);
    display: none;
    align-items: center; justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .overlay.show { display: flex; }
  .modal {
    background: var(--panel);
    border-radius: 16px;
    box-shadow: var(--shadow);
    width: 460px; max-width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    animation: pop 0.2s cubic-bezier(.22,1,.36,1);
  }
  @keyframes pop {
    from { opacity: 0; transform: scale(0.96) translateY(8px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
  .modal-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 18px;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0;
    background: var(--panel);
    border-radius: 16px 16px 0 0;
  }
  .modal-head h2 {
    font-size: 14.5px; font-weight: 700;
    color: var(--text-strong);
  }
  .modal-close {
    border: 0; background: transparent;
    color: var(--text-dim); font-size: 20px;
    cursor: pointer; padding: 0 4px; line-height: 1;
  }
  .modal-close:hover { color: var(--text); }
  .modal-body { padding: 18px; }

  .field { margin-bottom: 14px; }
  .field label {
    display: block;
    font-size: 11.5px; font-weight: 600;
    color: var(--text-dim);
    margin-bottom: 5px;
  }
  .field input[type="text"],
  .field input[type="number"],
  .field textarea,
  .field select {
    width: 100%;
    font-family: var(--ui); font-size: 12.5px;
    color: var(--text); background: var(--field);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 9px 11px; outline: none;
    transition: border-color 0.13s ease;
  }
  .field input:focus, .field textarea:focus, .field select:focus {
    border-color: var(--accent);
  }
  .field textarea { resize: vertical; min-height: 60px; line-height: 1.5; }
  .field-row { display: flex; gap: 10px; }
  .field-row .field { flex: 1; }

  /* 이미지 업로드 */
  .img-upload {
    width: 110px; height: 110px;
    border-radius: 12px;
    border: 1.5px dashed var(--border);
    background: var(--field);
    background-size: cover; background-position: center;
    cursor: pointer;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 5px;
    color: var(--text-dim);
    font-size: 11px;
    flex-shrink: 0;
    transition: border-color 0.13s ease;
  }
  .img-upload:hover { border-color: var(--accent); }
  .img-upload.has-img { border-style: solid; }
  .img-upload .iu-icon { font-size: 24px; }
  .img-row { display: flex; gap: 14px; align-items: flex-start; }
  .img-row .img-side { flex: 1; }

  /* 함께한 캐릭터 입력 */
  .char-input-row { display: flex; gap: 6px; }
  .char-input-row input { flex: 1; }
  .char-input-row button { flex-shrink: 0; }
  .char-list {
    display: flex; flex-wrap: wrap; gap: 5px;
    margin-top: 8px;
  }
  .char-tag {
    display: flex; align-items: center; gap: 5px;
    font-size: 11.5px;
    background: var(--accent-soft);
    color: var(--accent-deep);
    border-radius: 11px;
    padding: 3px 5px 3px 10px;
  }
  .char-tag button {
    border: 0; background: transparent;
    color: var(--accent-deep); cursor: pointer;
    font-size: 13px; padding: 0; line-height: 1;
    width: 15px; height: 15px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
  }
  .char-tag button:hover { background: rgba(0,0,0,0.1); }

  .modal-foot {
    display: flex; gap: 8px;
    padding: 14px 18px;
    border-top: 1px solid var(--border);
    position: sticky; bottom: 0;
    background: var(--panel);
  }
  .modal-foot .spacer { flex: 1; }

  /* 상세 보기 */
  .detail-img {
    width: 100%;
    aspect-ratio: 1 / 1;
    border-radius: 12px;
    background: var(--field);
    background-size: cover; background-position: center;
    margin-bottom: 14px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-dim); font-size: 36px;
  }
  .detail-name {
    font-size: 19px; font-weight: 800;
    color: var(--text-strong);
    letter-spacing: -0.02em;
  }
  /* 카테고리 — 이름 위 */
  .detail-cat {
    display: inline-block;
    font-size: 11px;
    background: var(--accent-soft);
    color: var(--accent-deep);
    border-radius: 9px;
    padding: 2px 9px;
    margin-bottom: 7px;
  }
  /* 한 줄 소개 — 이름 바로 아래, 라벨 없이 */
  .detail-tagline {
    font-size: 12.5px;
    color: var(--text-dim);
    line-height: 1.5;
    margin-top: 4px;
  }
  .detail-stats {
    display: flex; gap: 8px;
    margin: 14px 0;
  }
  .stat-box {
    flex: 1;
    background: var(--field);
    border-radius: 9px;
    padding: 9px 6px;
    text-align: center;
  }
  .stat-box .sb-label {
    font-size: 10px; color: var(--text-dim);
  }
  .stat-box .sb-value {
    font-size: 14px; font-weight: 700;
    color: var(--text-strong);
    margin-top: 2px;
  }
  .detail-section { margin-top: 14px; }
  .detail-section .ds-label {
    font-size: 11px; font-weight: 600;
    color: var(--text-dim);
    margin-bottom: 5px;
  }
  .detail-section .ds-text {
    font-size: 11.5px; line-height: 1.6;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }
  .detail-chars { display: flex; flex-wrap: wrap; gap: 5px; }
  .detail-chars .char-chip {
    font-size: 11.5px;
    padding: 3px 10px;
  }
  /* with — 박스 안에 한 줄 */
  .detail-with-box {
    background: var(--field);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 9px 12px;
    font-size: 12.5px;
    line-height: 1.5;
    word-break: break-word;
  }
  .detail-with-box .with-name { color: var(--text-strong); font-weight: 600; }
  .detail-with-box .with-sep { color: var(--text-dim); margin-right: 5px; }
  /* 태그 칩 — # 스타일 */
  .detail-chars .tag-chip {
    background: var(--accent-soft);
    color: var(--accent-deep);
    font-weight: 600;
  }

  .toast {
    position: fixed; bottom: 22px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--text-strong); color: var(--bg);
    font-size: 12.5px; font-weight: 500;
    padding: 10px 17px; border-radius: 8px;
    opacity: 0; pointer-events: none;
    transition: all 0.25s ease; z-index: 200;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 680px) {
    header { height: 50px; padding: 0 12px; }
    .brand small { display: none; }
    main { flex-direction: column; }
    .sidebar {
      width: 100%;
      border-right: 0;
      border-bottom: 1px solid var(--border);
      flex-direction: row;
      overflow-x: auto;
      padding: 10px 12px;
      gap: 6px;
    }
    .side-title { display: none; }
    .cat-item { flex-shrink: 0; white-space: nowrap; }
    .cat-item .cat-del { display: none !important; }
    .content { padding: 16px 14px 50px; }
    .search-box input { width: 140px; }
  }
</style>
</head>
<body data-theme="light">

<header>
  <div class="brand">
    <span class="mark">✦</span>
    페르소나 보관함
    <small>persona keeper</small>
  </div>
  <div class="header-actions">
    <button class="primary" id="addBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      <span>새 캐릭터</span>
    </button>
    <button class="icon" id="exportBtn" title="저장 (백업 파일로 내보내기)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
    </button>
    <button class="icon" id="importBtn" title="불러오기 (백업 파일에서)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
    </button>
    <input type="file" id="restoreFile" accept="application/json,.json" style="display:none">
    <button class="icon" id="themeBtn" title="테마 전환">
      <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="12" cy="12" r="4"/>
        <path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>
      </svg>
    </button>
  </div>
</header>

<main>
  <!-- 카테고리 사이드바 -->
  <aside class="sidebar">
    <div class="side-title">
      <span>카테고리</span>
      <button class="cat-add-btn" id="catAddBtn" title="카테고리 추가">＋</button>
    </div>
    <div id="catList"><!-- JS --></div>
  </aside>

  <!-- 콘텐츠 -->
  <section class="content">
    <div class="content-head">
      <div class="content-title">
        <span id="curCatName">전체</span>
        <span class="ct-count" id="curCount"></span>
      </div>
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="searchInput" placeholder="이름·캐릭터 검색">
      </div>
    </div>
    <div class="grid" id="grid"></div>
  </section>
</main>

<!-- 페르소나 추가/편집 모달 -->
<div class="overlay" id="editOverlay">
  <div class="modal">
    <div class="modal-head">
      <h2 id="editTitle">새 캐릭터</h2>
      <button class="modal-close" id="editClose">&times;</button>
    </div>
    <div class="modal-body">
      <div class="img-row">
        <div class="img-upload" id="imgUpload">
          <span class="iu-icon">＋</span>
          <span>이미지</span>
        </div>
        <div class="img-side">
          <div class="field" style="margin-bottom:10px;">
            <label>이름 *</label>
            <input type="text" id="fName" placeholder="캐릭터 이름" maxlength="40">
          </div>
          <div class="field" style="margin-bottom:0;">
            <label>카테고리</label>
            <select id="fCategory"></select>
          </div>
        </div>
      </div>
      <input type="file" id="imgFile" accept="image/*" style="display:none">

      <div class="field-row">
        <div class="field">
          <label>나이</label>
          <input type="text" id="fAge" placeholder="예: 21" maxlength="20">
        </div>
        <div class="field">
          <label>키</label>
          <input type="text" id="fHeight" placeholder="예: 170cm" maxlength="20">
        </div>
        <div class="field">
          <label>성별</label>
          <input type="text" id="fGender" placeholder="예: 여" maxlength="20">
        </div>
      </div>

      <div class="field">
        <label>한 줄 소개</label>
        <input type="text" id="fTagline" placeholder="이 캐릭터를 한 줄로" maxlength="80">
      </div>

      <div class="field">
        <label>with</label>
        <div class="char-input-row">
          <input type="text" id="fCharInput" placeholder="함께한 AI 캐릭터 이름 입력 후 추가" maxlength="40">
          <button type="button" id="fCharAdd">추가</button>
        </div>
        <div class="char-list" id="fCharList"></div>
      </div>

      <div class="field">
        <label>기타 메모</label>
        <textarea id="fMemo" placeholder="설정·성격·말투 등 자유롭게 적어두세요" rows="4"></textarea>
      </div>

      <div class="field" style="margin-bottom:0;">
        <label>태그</label>
        <div class="char-input-row">
          <input type="text" id="fTagInput" placeholder="태그 입력 후 추가 (예: 다정함, 판타지)" maxlength="20">
          <button type="button" id="fTagAdd">추가</button>
        </div>
        <div class="char-list" id="fTagList"></div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="danger" id="editDelete" style="display:none;">삭제</button>
      <div class="spacer"></div>
      <button id="editCancel">취소</button>
      <button class="primary" id="editSave">저장</button>
    </div>
  </div>
</div>

<!-- 페르소나 상세 보기 모달 -->
<div class="overlay" id="detailOverlay">
  <div class="modal">
    <div class="modal-head">
      <h2>캐릭터</h2>
      <button class="modal-close" id="detailClose">&times;</button>
    </div>
    <div class="modal-body" id="detailBody"><!-- JS --></div>
    <div class="modal-foot">
      <div class="spacer"></div>
      <button id="detailEdit">편집</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // 모든 데이터는 사용자 브라우저(localStorage)에만 저장됩니다.
  const $ = id => document.getElementById(id);
  const STORE_KEY = 'personakeeper:data';
  const THEME_KEY = 'personakeeper:theme';

  let storageOK = true;
  try { localStorage.setItem('__t__','1'); localStorage.removeItem('__t__'); }
  catch { storageOK = false; }

  // ===== 토스트 =====
  function toast(msg) {
    const t = $('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 1900);
  }

  // ===== 데이터 =====
  // { categories: [{id,name}], personas: [{id,name,catId,age,height,
  //   gender,tagline,chars:[],memo,tags:[],img,created}] }
  let store = { categories: [], personas: [] };
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) {
      const p = JSON.parse(raw);
      if (p && typeof p === 'object') {
        store.categories = Array.isArray(p.categories) ? p.categories : [];
        store.personas = Array.isArray(p.personas) ? p.personas : [];
      }
    }
  } catch {}
  function save() {
    if (!storageOK) { toast('브라우저 저장이 막혀 있어요'); return; }
    try { localStorage.setItem(STORE_KEY, JSON.stringify(store)); }
    catch { toast('저장 공간이 부족해요 (이미지가 너무 클 수 있어요)'); }
  }
  const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);

  // 현재 보고 있는 카테고리 ('all' = 전체)
  let curCat = 'all';
  let searchText = '';

  // ===== 카테고리 =====
  function renderCategories() {
    const wrap = $('catList');
    wrap.innerHTML = '';
    // 전체
    const all = document.createElement('div');
    all.className = 'cat-item' + (curCat === 'all' ? ' active' : '');
    all.innerHTML = '<span>전체</span>';
    const allCount = document.createElement('span');
    allCount.className = 'cat-count';
    allCount.textContent = store.personas.length;
    all.appendChild(allCount);
    all.addEventListener('click', () => { curCat = 'all'; refresh(); });
    wrap.appendChild(all);
    // 미분류
    const hasUncat = store.personas.some(p => !p.catId
      || !store.categories.find(c => c.id === p.catId));
    if (hasUncat) {
      const un = document.createElement('div');
      un.className = 'cat-item' + (curCat === 'none' ? ' active' : '');
      un.innerHTML = '<span>미분류</span>';
      const c = document.createElement('span');
      c.className = 'cat-count';
      c.textContent = store.personas.filter(p => !p.catId
        || !store.categories.find(cc => cc.id === p.catId)).length;
      un.appendChild(c);
      un.addEventListener('click', () => { curCat = 'none'; refresh(); });
      wrap.appendChild(un);
    }
    // 사용자 카테고리
    store.categories.forEach(cat => {
      const item = document.createElement('div');
      item.className = 'cat-item' + (curCat === cat.id ? ' active' : '');
      const label = document.createElement('span');
      label.textContent = cat.name;
      item.appendChild(label);
      const count = document.createElement('span');
      count.className = 'cat-count';
      count.textContent = store.personas.filter(p => p.catId === cat.id).length;
      item.appendChild(count);
      const del = document.createElement('button');
      del.className = 'cat-del';
      del.textContent = '×';
      del.title = '카테고리 삭제';
      del.addEventListener('click', e => {
        e.stopPropagation();
        deleteCategory(cat.id);
      });
      item.appendChild(del);
      item.addEventListener('click', () => { curCat = cat.id; refresh(); });
      wrap.appendChild(item);
    });
  }
  function addCategory() {
    const name = (prompt('새 카테고리 이름을 입력하세요') || '').trim();
    if (!name) return;
    if (store.categories.some(c => c.name === name)) {
      toast('같은 이름의 카테고리가 있어요');
      return;
    }
    store.categories.push({ id: uid(), name: name });
    save();
    refresh();
    toast('카테고리 "' + name + '" 추가됨');
  }
  function deleteCategory(id) {
    const cat = store.categories.find(c => c.id === id);
    if (!cat) return;
    const n = store.personas.filter(p => p.catId === id).length;
    const msg = n > 0
      ? '"' + cat.name + '" 카테고리를 삭제할까요?\n안에 있던 캐릭터 ' + n
        + '명은 미분류로 이동합니다.'
      : '"' + cat.name + '" 카테고리를 삭제할까요?';
    if (!confirm(msg)) return;
    store.categories = store.categories.filter(c => c.id !== id);
    store.personas.forEach(p => { if (p.catId === id) p.catId = ''; });
    if (curCat === id) curCat = 'all';
    save();
    refresh();
    toast('카테고리를 삭제했어요');
  }
  $('catAddBtn').addEventListener('click', addCategory);

  // ===== 페르소나 카드 그리드 =====
  function visiblePersonas() {
    let list = store.personas.slice();
    // 카테고리 필터
    if (curCat === 'none') {
      list = list.filter(p => !p.catId
        || !store.categories.find(c => c.id === p.catId));
    } else if (curCat !== 'all') {
      list = list.filter(p => p.catId === curCat);
    }
    // 검색
    const q = searchText.trim().toLowerCase();
    if (q) {
      list = list.filter(p => {
        if ((p.name || '').toLowerCase().includes(q)) return true;
        if ((p.tagline || '').toLowerCase().includes(q)) return true;
        return (p.chars || []).some(c => c.toLowerCase().includes(q));
      });
    }
    // store.personas 배열 순서 그대로 — 드래그로 순서 변경 가능
    return list;
  }
  function renderGrid() {
    const grid = $('grid');
    const list = visiblePersonas();
    // 헤더
    $('curCatName').textContent =
      curCat === 'all' ? '전체'
      : curCat === 'none' ? '미분류'
      : (store.categories.find(c => c.id === curCat) || {}).name || '전체';
    $('curCount').textContent = list.length + '명';

    grid.innerHTML = '';
    if (list.length === 0) {
      const e = document.createElement('div');
      e.className = 'empty';
      e.style.gridColumn = '1 / -1';
      if (store.personas.length === 0) {
        e.innerHTML = '<div class="e-emoji">🪪</div>'
          + '<div class="e-title">아직 캐릭터가 없어요</div>'
          + '<div class="e-sub">첫 번째 캐릭터를 등록해보세요</div>';
        const btn = document.createElement('button');
        btn.className = 'primary';
        btn.textContent = '＋ 새 캐릭터';
        btn.addEventListener('click', () => openEdit(null));
        e.appendChild(btn);
      } else {
        e.innerHTML = '<div class="e-emoji">🔍</div>'
          + '<div class="e-title">결과가 없어요</div>'
          + '<div class="e-sub">다른 카테고리나 검색어를 확인해보세요</div>';
      }
      grid.appendChild(e);
      return;
    }
    list.forEach(p => {
      const card = document.createElement('div');
      card.className = 'card';

      const img = document.createElement('div');
      img.className = 'card-img';
      if (p.img) img.style.backgroundImage = 'url(' + p.img + ')';
      else img.textContent = '👤';

      const body = document.createElement('div');
      body.className = 'card-body';

      const name = document.createElement('div');
      name.className = 'card-name';
      name.textContent = p.name || '이름 없음';
      body.appendChild(name);

      const metaParts = [];
      if (p.age) metaParts.push(p.age + '세');
      if (p.gender) metaParts.push(p.gender);
      if (p.height) metaParts.push(p.height);
      if (metaParts.length) {
        const meta = document.createElement('div');
        meta.className = 'card-meta';
        meta.textContent = metaParts.join(' · ');
        body.appendChild(meta);
      }
      if (p.tagline) {
        const tag = document.createElement('div');
        tag.className = 'card-tagline';
        tag.textContent = p.tagline;
        body.appendChild(tag);
      }
      if (p.chars && p.chars.length) {
        const chars = document.createElement('div');
        chars.className = 'card-chars';
        p.chars.slice(0, 3).forEach(c => {
          const chip = document.createElement('span');
          chip.className = 'char-chip';
          chip.textContent = c;
          chars.appendChild(chip);
        });
        if (p.chars.length > 3) {
          const more = document.createElement('span');
          more.className = 'char-chip more';
          more.textContent = '+' + (p.chars.length - 3);
          chars.appendChild(more);
        }
        body.appendChild(chars);
      }

      card.appendChild(img);
      card.appendChild(body);
      card.dataset.pid = p.id;
      card.draggable = true;
      card.addEventListener('click', () => {
        if (card._dragged) { card._dragged = false; return; }
        openDetail(p.id);
      });
      // ----- 드래그로 순서 변경 -----
      card.addEventListener('dragstart', e => {
        dragPid = p.id;
        card.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
      });
      card.addEventListener('dragend', () => {
        card.classList.remove('dragging');
        card._dragged = true;   // 드래그 직후 click 으로 상세 안 열리게
        document.querySelectorAll('.card.drag-over').forEach(c =>
          c.classList.remove('drag-over'));
      });
      card.addEventListener('dragover', e => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        if (p.id !== dragPid) card.classList.add('drag-over');
      });
      card.addEventListener('dragleave', () => {
        card.classList.remove('drag-over');
      });
      card.addEventListener('drop', e => {
        e.preventDefault();
        card.classList.remove('drag-over');
        if (!dragPid || dragPid === p.id) return;
        reorderPersona(dragPid, p.id);
      });
      grid.appendChild(card);
    });
  }
  // store.personas 에서 fromId 를 toId 앞 위치로 이동
  let dragPid = null;
  function reorderPersona(fromId, toId) {
    const arr = store.personas;
    const fromIdx = arr.findIndex(x => x.id === fromId);
    let toIdx = arr.findIndex(x => x.id === toId);
    if (fromIdx < 0 || toIdx < 0) return;
    const [moved] = arr.splice(fromIdx, 1);
    toIdx = arr.findIndex(x => x.id === toId);   // splice 후 재계산
    arr.splice(toIdx, 0, moved);
    save();
    renderGrid();
  }

  function refresh() {
    renderCategories();
    renderGrid();
  }

  $('searchInput').addEventListener('input', e => {
    searchText = e.target.value;
    renderGrid();
  });

  // ===== 추가 / 편집 모달 =====
  let editingId = null;     // null = 새로 만들기
  let editImg = '';         // 현재 편집 중인 이미지 data URL
  let editChars = [];       // 현재 편집 중인 with 캐릭터 목록
  let editTags = [];        // 현재 편집 중인 태그 목록

  function fillCategorySelect(selectedId) {
    const sel = $('fCategory');
    sel.innerHTML = '';
    const none = document.createElement('option');
    none.value = '';
    none.textContent = '— 미분류 —';
    sel.appendChild(none);
    store.categories.forEach(c => {
      const o = document.createElement('option');
      o.value = c.id;
      o.textContent = c.name;
      sel.appendChild(o);
    });
    sel.value = selectedId || '';
  }
  // 칩 목록 렌더 (with 캐릭터·태그 공용) — arr 에서 i 삭제 후 다시 그림
  function renderChips(wrapId, arr) {
    const wrap = $(wrapId);
    wrap.innerHTML = '';
    arr.forEach((c, i) => {
      const tag = document.createElement('div');
      tag.className = 'char-tag';
      const label = document.createElement('span');
      label.textContent = c;
      const del = document.createElement('button');
      del.textContent = '×';
      del.title = '삭제';
      del.addEventListener('click', () => {
        arr.splice(i, 1);
        renderChips(wrapId, arr);
      });
      tag.appendChild(label);
      tag.appendChild(del);
      wrap.appendChild(tag);
    });
  }
  function renderEditChars() { renderChips('fCharList', editChars); }
  function renderEditTags() { renderChips('fTagList', editTags); }
  function setEditImg(url) {
    editImg = url || '';
    const up = $('imgUpload');
    if (editImg) {
      up.style.backgroundImage = 'url(' + editImg + ')';
      up.classList.add('has-img');
      up.innerHTML = '';
    } else {
      up.style.backgroundImage = '';
      up.classList.remove('has-img');
      up.innerHTML = '<span class="iu-icon">＋</span><span>이미지</span>';
    }
  }
  function openEdit(id) {
    editingId = id;
    const p = id ? store.personas.find(x => x.id === id) : null;
    $('editTitle').textContent = p ? '캐릭터 편집' : '새 캐릭터';
    $('fName').value = p ? (p.name || '') : '';
    $('fAge').value = p ? (p.age || '') : '';
    $('fHeight').value = p ? (p.height || '') : '';
    $('fGender').value = p ? (p.gender || '') : '';
    $('fTagline').value = p ? (p.tagline || '') : '';
    $('fMemo').value = p ? (p.memo || '') : '';
    $('fCharInput').value = '';
    $('fTagInput').value = '';
    editChars = p ? (p.chars || []).slice() : [];
    editTags = p ? (p.tags || []).slice() : [];
    // 새로 만들 때 현재 카테고리를 기본값으로
    const defaultCat = p ? (p.catId || '')
      : (curCat !== 'all' && curCat !== 'none' ? curCat : '');
    fillCategorySelect(defaultCat);
    setEditImg(p ? (p.img || '') : '');
    renderEditChars();
    renderEditTags();
    $('editDelete').style.display = p ? '' : 'none';
    $('editOverlay').classList.add('show');
    $('fName').focus();
  }
  function closeEdit() {
    $('editOverlay').classList.remove('show');
  }
  $('addBtn').addEventListener('click', () => openEdit(null));
  $('editClose').addEventListener('click', closeEdit);
  $('editCancel').addEventListener('click', closeEdit);

  // 이미지 업로드
  $('imgUpload').addEventListener('click', () => $('imgFile').click());
  $('imgFile').addEventListener('change', e => {
    const file = e.target.files && e.target.files[0];
    e.target.value = '';
    if (!file) return;
    if (!file.type.startsWith('image/')) { toast('이미지 파일만 가능해요'); return; }
    // 큰 이미지는 줄여서 저장 (용량 절약)
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const maxW = 700;
        let w = img.naturalWidth, h = img.naturalHeight;
        if (w > maxW) { h = Math.round(h * (maxW / w)); w = maxW; }
        const cv = document.createElement('canvas');
        cv.width = w; cv.height = h;
        cv.getContext('2d').drawImage(img, 0, 0, w, h);
        try { setEditImg(cv.toDataURL('image/jpeg', 0.82)); }
        catch { setEditImg(reader.result); }
      };
      img.onerror = () => setEditImg(reader.result);
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });

  // with 캐릭터 추가
  function addEditChar() {
    const v = $('fCharInput').value.trim();
    if (!v) return;
    if (editChars.includes(v)) { toast('이미 추가된 캐릭터예요'); return; }
    editChars.push(v);
    $('fCharInput').value = '';
    renderEditChars();
    $('fCharInput').focus();
  }
  $('fCharAdd').addEventListener('click', addEditChar);
  $('fCharInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); addEditChar(); }
  });
  // 태그 추가
  function addEditTag() {
    const v = $('fTagInput').value.trim();
    if (!v) return;
    if (editTags.includes(v)) { toast('이미 추가된 태그예요'); return; }
    editTags.push(v);
    $('fTagInput').value = '';
    renderEditTags();
    $('fTagInput').focus();
  }
  $('fTagAdd').addEventListener('click', addEditTag);
  $('fTagInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); addEditTag(); }
  });

  // 저장
  $('editSave').addEventListener('click', () => {
    const name = $('fName').value.trim();
    if (!name) { toast('이름을 입력해주세요'); $('fName').focus(); return; }
    if (!editImg) {
      if (!confirm('이미지 없이 저장할까요?')) return;
    }
    const fields = {
      name: name,
      catId: $('fCategory').value,
      age: $('fAge').value.trim(),
      height: $('fHeight').value.trim(),
      gender: $('fGender').value.trim(),
      tagline: $('fTagline').value.trim(),
      chars: editChars.slice(),
      memo: $('fMemo').value,
      tags: editTags.slice(),
      img: editImg
    };
    if (editingId) {
      const p = store.personas.find(x => x.id === editingId);
      if (p) Object.assign(p, fields);
      toast('수정했어요');
    } else {
      fields.id = uid();
      fields.created = Date.now();
      store.personas.unshift(fields);
      toast('"' + name + '" 추가됨');
    }
    save();
    closeEdit();
    refresh();
  });

  // 삭제
  $('editDelete').addEventListener('click', () => {
    if (!editingId) return;
    const p = store.personas.find(x => x.id === editingId);
    if (!p) return;
    if (!confirm('"' + (p.name || '이 캐릭터') + '"을(를) 삭제할까요?')) return;
    store.personas = store.personas.filter(x => x.id !== editingId);
    save();
    closeEdit();
    refresh();
    toast('삭제했어요');
  });

  // ===== 상세 보기 =====
  let detailId = null;
  function openDetail(id) {
    const p = store.personas.find(x => x.id === id);
    if (!p) return;
    detailId = id;
    const body = $('detailBody');
    body.innerHTML = '';

    const img = document.createElement('div');
    img.className = 'detail-img';
    if (p.img) img.style.backgroundImage = 'url(' + p.img + ')';
    else img.textContent = '👤';
    body.appendChild(img);

    // 카테고리 — 이름 위
    const cat = store.categories.find(c => c.id === p.catId);
    const catEl = document.createElement('div');
    catEl.className = 'detail-cat';
    catEl.textContent = cat ? cat.name : '미분류';
    body.appendChild(catEl);

    const name = document.createElement('div');
    name.className = 'detail-name';
    name.textContent = p.name || '이름 없음';
    body.appendChild(name);

    // 한 줄 소개 — 이름 바로 아래, 라벨 없이
    if (p.tagline) {
      const tl = document.createElement('div');
      tl.className = 'detail-tagline';
      tl.textContent = p.tagline;
      body.appendChild(tl);
    }

    // 나이·키·성별
    const stats = document.createElement('div');
    stats.className = 'detail-stats';
    [['나이', p.age], ['키', p.height], ['성별', p.gender]].forEach(pair => {
      const box = document.createElement('div');
      box.className = 'stat-box';
      box.innerHTML = '<div class="sb-label">' + pair[0] + '</div>'
        + '<div class="sb-value">' + (pair[1] ? escapeHtml(pair[1]) : '—') + '</div>';
      stats.appendChild(box);
    });
    body.appendChild(stats);

    if (p.chars && p.chars.length) {
      body.appendChild(makeWithSection(p.chars));
    }
    if (p.memo) {
      body.appendChild(makeSection('기타 메모', p.memo));
    }
    if (p.tags && p.tags.length) {
      body.appendChild(makeTagSection(p.tags));
    }

    $('detailOverlay').classList.add('show');
  }
  // with 섹션 — 박스 안에 한 줄로
  function makeWithSection(arr) {
    const sec = document.createElement('div');
    sec.className = 'detail-section';
    const label = document.createElement('div');
    label.className = 'ds-label';
    label.textContent = 'with';
    const box = document.createElement('div');
    box.className = 'detail-with-box';
    arr.forEach((c, i) => {
      const nm = document.createElement('span');
      nm.className = 'with-name';
      nm.textContent = c;
      box.appendChild(nm);
      if (i < arr.length - 1) {
        const sep = document.createElement('span');
        sep.className = 'with-sep';
        sep.textContent = ',';
        box.appendChild(sep);
      }
    });
    sec.appendChild(label);
    sec.appendChild(box);
    return sec;
  }
  // 태그 섹션 — 라벨 없이, 각 태그 앞에 #
  function makeTagSection(arr) {
    const sec = document.createElement('div');
    sec.className = 'detail-section';
    const chips = document.createElement('div');
    chips.className = 'detail-chars';
    arr.forEach(c => {
      const chip = document.createElement('span');
      chip.className = 'char-chip tag-chip';
      chip.textContent = '#' + c;
      chips.appendChild(chip);
    });
    sec.appendChild(chips);
    return sec;
  }
  function makeSection(label, text) {
    const sec = document.createElement('div');
    sec.className = 'detail-section';
    const l = document.createElement('div');
    l.className = 'ds-label';
    l.textContent = label;
    const t = document.createElement('div');
    t.className = 'ds-text';
    t.textContent = text;
    sec.appendChild(l);
    sec.appendChild(t);
    return sec;
  }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"]/g, ch => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'
    }[ch]));
  }
  $('detailClose').addEventListener('click', () => {
    $('detailOverlay').classList.remove('show');
  });
  $('detailEdit').addEventListener('click', () => {
    $('detailOverlay').classList.remove('show');
    openEdit(detailId);
  });

  // 오버레이 바깥 클릭 시 닫기
  [['editOverlay', closeEdit],
   ['detailOverlay', () => $('detailOverlay').classList.remove('show')]
  ].forEach(pair => {
    $(pair[0]).addEventListener('click', e => {
      if (e.target === $(pair[0])) pair[1]();
    });
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      closeEdit();
      $('detailOverlay').classList.remove('show');
    }
  });

  // ===== 테마 =====
  const sun = '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>';
  const moon = '<path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/>';
  function applyTheme(t) {
    document.body.dataset.theme = t;
    $('themeIcon').innerHTML = t === 'dark' ? moon : sun;
  }
  applyTheme(localStorage.getItem(THEME_KEY) || 'light');
  $('themeBtn').addEventListener('click', () => {
    const next = document.body.dataset.theme === 'dark' ? 'light' : 'dark';
    applyTheme(next);
    try { localStorage.setItem(THEME_KEY, next); } catch {}
  });

  // ===== 저장 / 불러오기 (백업) =====
  // 캐릭터·카테고리 전체를 파일 하나로 내보내고, 되돌릴 수 있어요.
  $('exportBtn').addEventListener('click', () => {
    const payload = {
      _app: 'personakeeper',
      _version: 1,
      _exportedAt: new Date().toISOString(),
      data: store
    };
    let json;
    try { json = JSON.stringify(payload); }
    catch { toast('백업 생성에 실패했어요'); return; }
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const d = new Date();
    const pad = n => String(n).padStart(2, '0');
    a.href = url;
    a.download = '페르소나보관함-' + d.getFullYear()
      + pad(d.getMonth() + 1) + pad(d.getDate()) + '.json';
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    toast('캐릭터 ' + store.personas.length + '명을 파일로 저장했어요');
  });
  $('importBtn').addEventListener('click', () => $('restoreFile').click());
  $('restoreFile').addEventListener('change', e => {
    const file = e.target.files && e.target.files[0];
    e.target.value = '';
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      let payload;
      try { payload = JSON.parse(reader.result); }
      catch { toast('백업 파일을 읽을 수 없어요'); return; }
      if (!payload || payload._app !== 'personakeeper' || !payload.data) {
        toast('페르소나 보관함 백업 파일이 아니에요');
        return;
      }
      const d = payload.data;
      const cats = Array.isArray(d.categories) ? d.categories : [];
      const ppl = Array.isArray(d.personas) ? d.personas : [];
      if (!confirm('백업을 불러오면 지금의 캐릭터 ' + store.personas.length
        + '명이 백업 파일의 ' + ppl.length + '명으로 모두 바뀝니다.\n\n계속할까요?')) {
        return;
      }
      store.categories = cats;
      store.personas = ppl;
      save();
      curCat = 'all';
      searchText = '';
      $('searchInput').value = '';
      refresh();
      toast('캐릭터 ' + ppl.length + '명을 불러왔어요');
    };
    reader.onerror = () => toast('파일을 읽지 못했어요');
    reader.readAsText(file);
  });

  // ===== 시작 =====
  refresh();
</script>
</body>
</html>
