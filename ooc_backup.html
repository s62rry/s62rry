<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<style>
  :root {
    --bg: #f2f4f7;
    --panel: #ffffff;
    --border: #dde2ea;
    --text: #41454f;
    --text-strong: #1a1d24;
    --text-dim: #82869a;
    --accent: #2f6df0;
    --accent-soft: #e6eefe;
    --field: #f9fafc;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 8px 24px rgba(0,0,0,0.05);
    --ui: 'Pretendard Variable', 'Pretendard', -apple-system, sans-serif;
  }
  [data-theme="dark"] {
    --bg: #14161c;
    --panel: #1c1f28;
    --border: #2b2f3b;
    --text: #c4c8d4;
    --text-strong: #e6e8ee;
    --text-dim: #858a99;
    --accent: #5b9bf0;
    --accent-soft: #1d2a44;
    --field: #181a21;
    --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 8px 24px rgba(0,0,0,0.25);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* 얇은 스크롤바 */
  * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
  ::-webkit-scrollbar { width: 7px; height: 7px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

  body {
    font-family: var(--ui);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background 0.25s ease, color 0.25s ease;
  }

  header {
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 18px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    position: sticky;
    top: 0;
    z-index: 20;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 9px;
    font-weight: 600;
    font-size: 15px;
    letter-spacing: -0.02em;
    color: var(--text-strong);
  }
  .brand .dot { width: 11px; height: 11px; border-radius: 3px; background: var(--accent); }
  .brand small { color: var(--text-dim); font-weight: 400; font-size: 11px; }

  button {
    font-family: var(--ui);
    font-size: 12.5px;
    font-weight: 500;
    color: var(--text);
    background: var(--field);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 8px 13px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: all 0.14s ease;
  }
  button:hover { border-color: var(--accent); color: var(--accent); }
  button:active { transform: translateY(1px); }
  button svg { width: 14px; height: 14px; }
  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  button.primary:hover { opacity: 0.88; color: #fff; }
  button.icon { padding: 8px; }
  header button { color: var(--text-strong); }
  header button:not(:hover) { color: var(--text-strong); }
  header button.primary { color: #fff; }

  .wrap {
    max-width: 720px;
    margin: 0 auto;
    padding: 22px 18px 60px;
  }

  /* 입력 카드 */
  .composer {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    box-shadow: var(--shadow);
    margin-bottom: 14px;
  }
  .composer-label {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  .char-count {
    letter-spacing: 0;
    text-transform: none;
    font-weight: 500;
    color: var(--text-dim);
    opacity: 0.7;
  }
  textarea {
    width: 100%;
    font-family: var(--ui);
    font-size: 14px;
    line-height: 1.65;
    color: var(--text);
    background: var(--field);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 11px 13px;
    outline: none;
    resize: vertical;
    min-height: 84px;
    transition: border-color 0.14s ease;
  }
  textarea:focus { border-color: var(--accent); }

  /* 하단 툴바 */
  .composer-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 11px;
  }
  .composer-bar .spacer { flex: 1; }

  /* 툴바 버튼 — 컴팩트, 아이콘 + 짧은 라벨 */
  .bar-btn {
    font-size: 12px;
    font-weight: 500;
    padding: 6px 10px;
    border-radius: 7px;
    gap: 5px;
  }
  .bar-btn svg { width: 13px; height: 13px; }
  .bar-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .bar-btn.primary:hover { opacity: 0.88; color: #fff; }
  /* 입력칸이 비면 저장 버튼을 흐리게 */
  .bar-btn.is-disabled {
    opacity: 0.4;
    pointer-events: none;
  }

  /* 카테고리 태그 버튼 — 미선택이면 옅게 */
  .tag-btn {
    font-size: 12px;
    font-weight: 500;
    padding: 6px 10px;
    border-radius: 7px;
    gap: 5px;
    color: var(--text-dim);
    border-color: var(--border);
  }
  .tag-btn svg { width: 13px; height: 13px; }
  .tag-btn.has-cat {
    color: var(--accent);
    border-color: var(--accent);
    background: var(--accent-soft);
  }

  /* 카테고리 모달 */
  .cat-pick-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 13px;
  }
  .cat-pick {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 12.5px;
    padding: 6px 11px;
    border: 1px solid var(--border);
    border-radius: 16px;
    background: var(--field);
    color: var(--text);
    cursor: pointer;
    transition: all 0.13s ease;
  }
  .cat-pick:hover { border-color: var(--accent); }
  .cat-pick.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .cat-pick .cat-x {
    display: inline-flex;
    width: 14px; height: 14px;
    align-items: center; justify-content: center;
    border-radius: 50%;
    font-size: 13px;
    opacity: 0.6;
  }
  .cat-pick .cat-x:hover { opacity: 1; background: rgba(0,0,0,0.15); }
  .cat-add-row {
    display: flex;
    gap: 7px;
  }
  .cat-add-row input {
    flex: 1;
    font-family: var(--ui);
    font-size: 13px;
    color: var(--text);
    background: var(--field);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 8px 11px;
    outline: none;
  }
  .cat-add-row input:focus { border-color: var(--accent); }

  /* 검색줄 카테고리 필터 select */
  select {
    font-family: var(--ui);
    font-size: 12px;
    color: var(--text);
    background: var(--field);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 7px;
    outline: none;
    cursor: pointer;
  }
  select:focus { border-color: var(--accent); }

  /* 후속 OOC 연결 표시줄 */
  .reply-bar {
    display: none;
    align-items: center;
    gap: 8px;
    background: var(--accent-soft);
    border: 1px solid var(--accent);
    border-radius: 8px;
    padding: 7px 10px;
    margin-bottom: 9px;
    font-size: 12px;
  }
  .reply-bar.show { display: flex; }
  .reply-bar svg { width: 14px; height: 14px; color: var(--accent); flex-shrink: 0; }
  .reply-text {
    flex: 1; min-width: 0;
    color: var(--accent);
    font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .reply-cancel {
    border: 0; background: transparent; padding: 2px;
    color: var(--accent); border-radius: 4px; cursor: pointer;
    display: inline-flex;
  }
  .reply-cancel:hover { background: rgba(0,0,0,0.1); }
  .reply-cancel svg { width: 13px; height: 13px; }

  /* 검색 */
  .search-row {
    display: flex;
    align-items: center;
    gap: 9px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 9px 13px;
    margin-bottom: 14px;
  }
  .search-row svg { width: 16px; height: 16px; color: var(--text-dim); flex-shrink: 0; }
  .search-row input {
    flex: 1;
    border: 0;
    background: transparent;
    outline: none;
    font-family: var(--ui);
    font-size: 13.5px;
    color: var(--text);
  }
  .search-row input::placeholder { color: var(--text-dim); }
  .search-clear {
    border: 0; background: transparent; padding: 3px;
    color: var(--text-dim); border-radius: 5px;
    display: none;
  }
  .search-clear:hover { color: var(--accent); background: var(--accent-soft); }
  .search-clear.show { display: inline-flex; }
  .search-row select { flex-shrink: 0; }

  /* 목록 헤더 */
  .list-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 9px;
    padding: 0 2px;
  }
  .list-head .count {
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.05em; text-transform: uppercase;
    color: var(--text-dim);
  }
  .list-head .copy-all {
    font-size: 11.5px;
    padding: 4px 9px;
  }

  /* 항목 */
  .entry {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 14px;
    margin-bottom: 9px;
    transition: border-color 0.14s ease;
    animation: entryIn 0.22s ease both;
  }
  @keyframes entryIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .entry:hover { border-color: var(--accent); }
  /* 후속 OOC — 들여쓰기 없이 아주 옅은 배경색으로만 구분 */
  .entry.is-reply {
    background: var(--field);
  }
  /* 항목 상단 메타 (카테고리 배지 + 후속 표시) */
  .entry-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }
  .entry-meta:empty { display: none; }
  .cat-badge {
    font-size: 10.5px;
    font-weight: 600;
    color: var(--accent);
    background: var(--accent-soft);
    border-radius: 10px;
    padding: 2px 9px;
  }
  .reply-badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 10.5px;
    font-weight: 500;
    color: var(--text-dim);
  }
  .reply-badge svg { width: 11px; height: 11px; }
  /* 고정 배지 */
  .pin-badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 10.5px;
    font-weight: 600;
    color: var(--accent);
  }
  .pin-badge svg { width: 10px; height: 10px; }
  /* 제목 줄 — 자동 제목 + 글자 수 */
  .entry-title-row {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 5px;
  }
  .entry-title {
    flex: 1;
    min-width: 0;
    font-size: 13.5px;
    font-weight: 700;
    color: var(--text-strong);
    line-height: 1.45;
    word-break: break-word;
  }
  .entry-title .no-title {
    font-weight: 500;
    color: var(--text-dim);
    font-style: italic;
  }
  .entry-title mark {
    background: #ffe27a;
    color: #1a1d24;
    border-radius: 2px;
  }
  [data-theme="dark"] .entry-title mark { background: #6b5a1f; color: #ffe9a8; }
  .entry-text {
    font-size: 13px;
    line-height: 1.66;
    color: var(--text);
    word-break: break-word;
    white-space: pre-wrap;
    position: relative;
  }
  /* 접힌 상태: 높이 제한 + 하단 페이드 */
  .entry-text.clamped {
    max-height: 132px;
    overflow: hidden;
  }
  .entry-text.clamped::after {
    content: '';
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 46px;
    background: linear-gradient(transparent, var(--panel));
    pointer-events: none;
  }
  .entry-text mark {
    background: #ffe27a;
    color: #1a1d24;
    border-radius: 2px;
    padding: 0 1px;
  }
  /* 다크모드 — 밝은 노랑 대신 차분한 톤 */
  [data-theme="dark"] .entry-text mark {
    background: #6b5a1f;
    color: #ffe9a8;
  }
  /* 펼치기/접기 토글 — 왼쪽 정렬된 작은 텍스트 버튼 */
  .toggle-fold {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    margin: 8px 0 0;
    padding: 3px 0;
    background: transparent;
    border: 0;
    font-size: 11.5px;
    font-weight: 600;
    color: var(--accent);
    cursor: pointer;
    transition: opacity 0.13s ease;
  }
  .toggle-fold:hover { opacity: 0.7; }
  .toggle-fold svg { width: 12px; height: 12px; }
  /* 후속 항목은 배경이 --field 라 페이드 색을 맞춤 */
  .entry.is-reply .entry-text.clamped::after {
    background: linear-gradient(transparent, var(--field));
  }
  .entry-foot {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    margin-top: 10px;
    min-height: 28px;
  }
  .entry-len {
    flex-shrink: 0;
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
  }
  /* 버튼 줄 — 평소엔 숨기고 항목에 마우스를 올리면 부드럽게 등장 */
  .entry-btns {
    display: flex;
    gap: 4px;
    opacity: 0;
    transform: translateY(2px);
    transition: opacity 0.15s ease, transform 0.15s ease;
    pointer-events: none;
  }
  .entry:hover .entry-btns,
  .entry:focus-within .entry-btns {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }
  /* 터치 기기(hover 불가)에서는 항상 보이게 */
  @media (hover: none) {
    .entry-btns { opacity: 1; transform: none; pointer-events: auto; }
  }
  /* 목록 항목 아이콘 버튼 — 아이콘만 */
  .ent-icon {
    padding: 6px;
    border-radius: 6px;
    color: var(--text-dim);
  }
  .ent-icon svg { width: 14px; height: 14px; }
  .ent-icon:hover { color: var(--accent); border-color: var(--accent); }
  .ent-icon.del:hover { color: #e0556b; border-color: #e0556b; }
  /* 고정된 항목의 핀 버튼은 켜진 색으로 */
  .ent-icon.pinned { color: var(--accent); border-color: var(--accent); }
  /* 고정된 카드는 살짝 강조 */
  .entry.is-pinned { border-color: var(--accent); }

  .empty {
    text-align: center;
    color: var(--text-dim);
    font-size: 13px;
    padding: 48px 0;
    line-height: 1.7;
  }
  .empty .big { font-size: 30px; margin-bottom: 8px; }

  /* 토스트 */
  .toast {
    position: fixed;
    bottom: 22px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--text-strong);
    color: var(--bg);
    font-size: 12.5px; font-weight: 500;
    padding: 10px 17px; border-radius: 8px;
    opacity: 0; pointer-events: none;
    transition: all 0.25s ease;
    z-index: 200;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* 확인 모달 */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    display: none; align-items: center; justify-content: center;
    z-index: 100; backdrop-filter: blur(2px);
  }
  .overlay.show { display: flex; }
  .modal {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 13px;
    box-shadow: var(--shadow);
    width: 340px; max-width: calc(100vw - 32px);
  }
  .modal.modal-wide { width: 540px; }
  .modal-head {
    padding: 17px 19px 12px;
    font-size: 14.5px; font-weight: 600;
    color: var(--text-strong);
  }
  .modal-body {
    padding: 0 19px 4px;
    font-size: 13px; line-height: 1.6;
  }
  .modal-foot {
    display: flex; gap: 8px; justify-content: flex-end;
    padding: 14px 19px 17px;
  }
  .modal-foot .danger { background: #e0556b; border-color: #e0556b; color: #fff; }
  .modal-foot .danger:hover { opacity: 0.88; color: #fff; }
  .edit-textarea {
    width: 100%;
    font-family: var(--ui);
    font-size: 13.5px;
    line-height: 1.65;
    color: var(--text);
    background: var(--field);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 11px 13px;
    outline: none;
    resize: vertical;
    min-height: 200px;
    max-height: 60vh;
  }
  .edit-textarea:focus { border-color: var(--accent); }
</style>
</head>

<script>
  // ============ 저장 (localStorage) ============
  // 모든 데이터는 사용자 브라우저에만 저장됩니다. 외부 서버로 전송되지 않습니다.
  const STORE_KEY = 'oocbackup:entries';
  const CAT_KEY = 'oocbackup:categories';
  const THEME_KEY = 'oocbackup:theme';
  const DRAFT_KEY = 'oocbackup:draft';   // 작성 중 임시저장

  let storageOK = true;
  try { localStorage.setItem('__t__', '1'); localStorage.removeItem('__t__'); }
  catch { storageOK = false; }

  // entries: [{ id, text, date, category, parentId }]
  //   category: 분류명 (없으면 '')
  //   parentId: 후속 OOC 인 경우 원본 항목 id (없으면 null)
  let entries = [];
  let categories = [];   // 사용자가 만든 카테고리명 목록
  function loadEntries() {
    try {
      const raw = localStorage.getItem(STORE_KEY);
      if (raw) entries = JSON.parse(raw);
    } catch { entries = []; }
    if (!Array.isArray(entries)) entries = [];
    // 구버전 데이터 보정
    entries.forEach(e => {
      if (e.category == null) e.category = '';
      if (e.parentId === undefined) e.parentId = null;
      if (e.pinned == null) e.pinned = false;
      if (e.copyCount == null) e.copyCount = 0;
    });
    try {
      const rawC = localStorage.getItem(CAT_KEY);
      if (rawC) categories = JSON.parse(rawC);
    } catch { categories = []; }
    if (!Array.isArray(categories)) categories = [];
  }
  function saveEntries() {
    if (!storageOK) return;
    try {
      localStorage.setItem(STORE_KEY, JSON.stringify(entries));
      localStorage.setItem(CAT_KEY, JSON.stringify(categories));
    } catch {}
  }
  loadEntries();

  const $ = id => document.getElementById(id);
  const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 6);

  // ============ OOC 형식 변환 ============
  // 목표 형식: *[OOC:내용]*
  // 앞쪽은 ' * '  '[OOC:' 를, 뒤쪽은 ']'  '*' 를 각각 따로 검사해
  // 이미 있는 조각은 그대로 두고 "빠진 조각만" 채운다.
  //  예) "[OOC:...]"  → 앞에 * , 뒤에 *  만 보충
  //      "OOC:..."    → 앞에 *[ , 뒤에 ]* 보충
  //      "*[OOC:...]*"→ 그대로

  function toOOC(text) {
    let s = text.trim();
    if (!s) return '';

    // --- 앞쪽 처리 ---
    // 'OOC:' 가 있는지부터 본다. 있으면 그 앞의 * / [ 유무를 보고 빠진 것만 채움.
    const hm = s.match(/^(\s*\*\s*)?(\[\s*)?(OOC\s*:)/i);
    let headPrefix = '';
    if (hm) {
      const hasStar = !!hm[1];
      const hasBracket = !!hm[2];
      if (!hasStar) headPrefix += '*';
      if (!hasBracket) headPrefix += '[';
      // 'OOC:' 자체는 이미 있으니 더 안 붙임
    } else {
      // OOC: 가 아예 없음 → 통째로 *[OOC: 붙임
      headPrefix = '*[OOC:';
    }

    // --- 뒤쪽 처리 ---
    const tm = s.match(/(\]\s*)?(\*\s*)?$/);
    let tailSuffix = '';
    const hasCloseBracket = !!(tm && tm[1]);
    const hasCloseStar = !!(tm && tm[2]);
    if (!hasCloseBracket) tailSuffix += ']';
    if (!hasCloseStar) tailSuffix += '*';

    return headPrefix + s + tailSuffix;
  }

  // toOOC 결과에서 앞/뒤로 "새로 붙인" 마커 길이를 구해 본문만 떼어냄.
  // (강조용이 아니라 검색 하이라이트가 본문에만 걸리게 하기 위함)
  function splitOOC(text) {
    const s = text.trim();
    const full = toOOC(s);
    // full 은 headPrefix + s + tailSuffix 이므로,
    // 원문 s 의 위치를 그대로 찾으면 됨
    const idx = full.indexOf(s);
    if (idx === -1) return { head: '', body: full, tail: '' };
    return {
      head: full.slice(0, idx),
      body: s,
      tail: full.slice(idx + s.length)
    };
  }

  // OOC 문자열을 HTML 로. innerFn 으로 본문 가공(검색 하이라이트) 가능.
  function oocToHtml(text, innerFn) {
    const { head, body, tail } = splitOOC(text);
    const bodyHtml = innerFn ? innerFn(body) : esc(body);
    return esc(head) + bodyHtml + esc(tail);
  }

  // 제목에서 건너뛸 상투적 도입부 패턴
  //  예) "현재 롤플레잉 일시 중단", "RP 잠시 중단", "기존 롤플레잉 일시중지",
  //      "현재까지의 롤플레잉 종료", "새 에피소드 시작", "외전 에피소드 시작" 등
  const SKIP_TITLE_RE = new RegExp(
    '(롤플레잉|롤플|rp|알피)?\\s*' +
    '(을|를|는|은)?\\s*' +
    '(잠시|잠깐|기존|현재|이전|현재까지의)?\\s*' +
    '(롤플레잉|롤플|rp|알피|대화|에피소드)?\\s*' +
    '(일시\\s*)?(중단|중지|종료|정지|시작|개시|중단한다|시작한다)',
    'i'
  );
  // 한 문장이 '도입부'에 불과한지 — 키워드가 있고 길이가 짧으면 도입부로 봄
  function isIntroSentence(sentence) {
    const s = sentence.trim();
    if (!s) return true;
    if (s.length > 35) return false;   // 길면 실제 내용일 가능성 ↑
    // 중단/중지/종료/시작 류 단어가 들어있으면 도입부로 간주
    return /(중단|중지|종료|정지|시작|개시)/.test(s) && SKIP_TITLE_RE.test(s);
  }

  // 항목의 자동 제목 — OOC 마커와 상투적 도입부를 떼고 첫 의미 문장을 제목으로
  function autoTitle(text) {
    let s = text.trim();
    s = s.replace(/^\s*\*?\s*\[?\s*OOC\s*:/i, '');   // 앞 마커 제거
    s = s.replace(/\]\s*\*?\s*$/, '');               // 뒤 마커 제거
    s = s.trim();
    // 줄바꿈을 공백으로 합쳐 한 덩어리로 본 뒤 문장 단위로 분리
    const flat = s.replace(/\s*\n\s*/g, ' ').trim();
    // 마침표/물음표/느낌표 뒤에서 끊되 구분자는 살림
    const sentences = flat.split(/(?<=[.!?。])\s+/).map(t => t.trim()).filter(Boolean);
    // 앞쪽의 도입부 문장들을 건너뛰고 첫 의미 문장을 찾음
    let title = '';
    for (const sen of sentences) {
      if (!isIntroSentence(sen)) { title = sen; break; }
    }
    // 전부 도입부였다면(드묾) 그냥 첫 문장 사용
    if (!title) title = sentences[0] || flat;
    // 끝의 마침표·말줄임표는 떼고, 너무 길면 자름
    title = title.replace(/[.!?。…\s]+$/, '').trim();
    return title.length > 40 ? title.slice(0, 40) + '…' : title;
  }

  // ============ 토스트 ============
  function toast(msg) {
    const t = $('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  // HTML 이스케이프
  function esc(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  // ============ PC <-> NPC 맞바꿈 ============
  // 'NPC' 안에 'PC' 가 들어 있으므로, NPC 를 먼저 보호 토큰으로 치환한 뒤
  // PC 를 NPC 로, 보호 토큰을 PC 로 되돌린다. 대소문자는 원형 유지.
  // 토큰에는 알파벳을 쓰지 않는다 (PC 치환에 안 걸리도록).
  function swapPcNpc(text) {
    const TOKEN = '\u0001\u0002\u0003';   // 알파벳 없는 보호 토큰
    // 1) NPC(대소문자 무관) → 토큰
    let s = text.replace(/NPC/gi, TOKEN);
    // 2) 남은 PC → NPC (소문자 pc 면 npc)
    s = s.replace(/PC/gi, m => (m === m.toLowerCase() ? 'npc' : 'NPC'));
    // 3) 토큰 → PC
    s = s.split(TOKEN).join('PC');
    return s;
  }

  // ============ 입력 ============
  const input = $('input');

  // 글자 수 표시 + 저장 버튼 활성/비활성 갱신
  function updateInputState() {
    const len = input.value.trim().length;
    $('charCount').textContent = len ? len.toLocaleString() + '자' : '';
    $('saveBtn').classList.toggle('is-disabled', len === 0);
  }

  // 작성 중 임시저장 — 입력할 때마다 localStorage 에 보관, 시작 시 복원
  function saveDraft() {
    try {
      if (input.value) localStorage.setItem(DRAFT_KEY, input.value);
      else localStorage.removeItem(DRAFT_KEY);
    } catch {}
  }
  function restoreDraft() {
    try {
      const d = localStorage.getItem(DRAFT_KEY);
      if (d) { input.value = d; }
    } catch {}
  }
  input.addEventListener('input', () => {
    updateInputState();
    saveDraft();
  });

  // ============ 변환본 복사 ============
  function copyText(str, okMsg) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(str)
        .then(() => toast(okMsg))
        .catch(() => fallbackCopy(str, okMsg));
    } else {
      fallbackCopy(str, okMsg);
    }
  }
  function fallbackCopy(str, okMsg) {
    const ta = document.createElement('textarea');
    ta.value = str;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); toast(okMsg); }
    catch { toast('복사에 실패했습니다'); }
    document.body.removeChild(ta);
  }

  $('copyInput').addEventListener('click', () => {
    const v = input.value.trim();
    if (!v) { toast('내용을 입력하세요'); input.focus(); return; }
    copyText(toOOC(v), 'OOC 변환본을 복사했습니다');
  });

  // ============ PC <-> NPC 변환 (작성칸) ============
  $('swapBtn').addEventListener('click', () => {
    if (!input.value.trim()) { toast('내용을 입력하세요'); input.focus(); return; }
    input.value = swapPcNpc(input.value);
    toast('PC ↔ NPC 를 바꿨습니다');
  });

  // ============ 카테고리 ============
  const catFilter = $('catFilter');
  let selectedCategory = '';   // 작성 중인 OOC 의 분류 ('' = 없음)

  // 작성칸 태그 버튼 갱신
  function updateCatBtn() {
    const btn = $('catBtn');
    const label = $('catBtnLabel');
    if (selectedCategory) {
      label.textContent = selectedCategory;
      btn.classList.add('has-cat');
    } else {
      label.textContent = '분류';
      btn.classList.remove('has-cat');
    }
  }

  // 검색줄 필터 select 갱신
  function refreshCatFilter() {
    const curFil = catFilter.value;
    catFilter.innerHTML =
      '<option value="__all__">전체 분류</option>' +
      '<option value="__none__">분류 없음</option>';
    categories.forEach(c => {
      const o = document.createElement('option');
      o.value = c; o.textContent = c;
      catFilter.appendChild(o);
    });
    if (curFil === '__none__' || categories.includes(curFil)) catFilter.value = curFil;
  }
  catFilter.addEventListener('change', renderList);

  // 카테고리 모달
  // catTargetId: null = 작성 중인 OOC 의 분류 선택,
  //              항목 id = 그 항목의 분류를 바꿈
  const catOverlay = $('catOverlay');
  let catTargetId = null;

  // 현재 모달이 가리키는 분류값을 읽고/쓰는 헬퍼
  function getPickedCat() {
    if (catTargetId) {
      const en = entries.find(x => x.id === catTargetId);
      return en ? (en.category || '') : '';
    }
    return selectedCategory;
  }
  function setPickedCat(val) {
    if (catTargetId) {
      const en = entries.find(x => x.id === catTargetId);
      if (en) { en.category = val; saveEntries(); renderList(); }
    } else {
      selectedCategory = val;
      updateCatBtn();
    }
  }

  function renderCatPickList() {
    const wrap = $('catPickList');
    const cur = getPickedCat();
    wrap.innerHTML = '';
    // '분류 없음' 선택지
    const none = document.createElement('span');
    none.className = 'cat-pick' + (cur === '' ? ' active' : '');
    none.textContent = '분류 없음';
    none.addEventListener('click', () => {
      setPickedCat('');
      catOverlay.classList.remove('show');
    });
    wrap.appendChild(none);
    // 각 카테고리
    categories.forEach(c => {
      const chip = document.createElement('span');
      chip.className = 'cat-pick' + (cur === c ? ' active' : '');
      const name = document.createElement('span');
      name.textContent = c;
      name.addEventListener('click', () => {
        setPickedCat(c);
        catOverlay.classList.remove('show');
      });
      const x = document.createElement('span');
      x.className = 'cat-x';
      x.textContent = '×';
      x.title = '카테고리 삭제';
      x.addEventListener('click', e => {
        e.stopPropagation();
        categories = categories.filter(v => v !== c);
        if (selectedCategory === c) selectedCategory = '';
        // 이 분류를 쓰던 항목들은 분류 없음으로
        entries.forEach(en => { if (en.category === c) en.category = ''; });
        saveEntries();
        refreshCatFilter();
        renderCatPickList();
        updateCatBtn();
        renderList();
        toast('카테고리 "' + c + '" 삭제됨');
      });
      chip.appendChild(name);
      chip.appendChild(x);
      wrap.appendChild(chip);
    });
  }
  // 모달 열기 — id 없으면 작성용, id 있으면 그 항목용
  function openCatPicker(targetId) {
    catTargetId = targetId || null;
    renderCatPickList();
    $('catNewInput').value = '';
    catOverlay.classList.add('show');
  }
  $('catBtn').addEventListener('click', () => openCatPicker(null));
  $('catClose').addEventListener('click', () => catOverlay.classList.remove('show'));
  catOverlay.addEventListener('click', e => {
    if (e.target === catOverlay) catOverlay.classList.remove('show');
  });
  // 새 카테고리 추가 — 추가하면서 현재 대상에 바로 적용
  function addCategory() {
    const name = $('catNewInput').value.trim();
    if (!name) { $('catNewInput').focus(); return; }
    if (categories.includes(name)) {
      setPickedCat(name);
      renderCatPickList();
      $('catNewInput').value = '';
      toast('이미 있는 카테고리입니다');
      return;
    }
    categories.push(name);
    categories.sort((a, b) => a.localeCompare(b, 'ko'));
    saveEntries();
    refreshCatFilter();
    setPickedCat(name);
    renderCatPickList();
    $('catNewInput').value = '';
    toast('카테고리 "' + name + '" 추가됨');
  }
  $('catAddBtn').addEventListener('click', addCategory);
  $('catNewInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addCategory();
  });

  // ============ 내용 수정 ============
  const editOverlay = $('editOverlay');
  let editTargetId = null;
  function openEdit(id) {
    const en = entries.find(x => x.id === id);
    if (!en) return;
    editTargetId = id;
    $('editInput').value = en.text;
    editOverlay.classList.add('show');
    $('editInput').focus();
  }
  function closeEdit() {
    editOverlay.classList.remove('show');
    editTargetId = null;
  }
  $('editCancel').addEventListener('click', closeEdit);
  editOverlay.addEventListener('click', e => {
    if (e.target === editOverlay) closeEdit();
  });
  $('editSave').addEventListener('click', () => {
    const en = entries.find(x => x.id === editTargetId);
    if (!en) { closeEdit(); return; }
    const v = $('editInput').value.trim();
    if (!v) { toast('내용을 입력하세요'); $('editInput').focus(); return; }
    en.text = v;
    saveEntries();
    renderList();
    closeEdit();
    toast('수정했습니다');
  });
  // 수정 모달에서 Ctrl/Cmd+Enter 로 저장
  $('editInput').addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault();
      $('editSave').click();
    }
  });

  // ============ 후속 OOC 연결 모드 ============
  let replyToId = null;  // 후속 작성 중이면 원본 id
  function setReplyTo(id) {
    replyToId = id;
    const bar = $('replyBar');
    if (id) {
      const parent = entries.find(e => e.id === id);
      const short = parent
        ? (parent.text.length > 30 ? parent.text.slice(0, 30) + '…' : parent.text)
        : '(삭제된 항목)';
      $('replyText').textContent = '후속 OOC: "' + short + '" 에 연결';
      bar.classList.add('show');
      input.focus();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    } else {
      bar.classList.remove('show');
    }
  }
  $('replyCancel').addEventListener('click', () => setReplyTo(null));

  // ============ 백업에 저장 ============
  $('saveBtn').addEventListener('click', () => {
    const v = input.value.trim();
    if (!v) { toast('내용을 입력하세요'); input.focus(); return; }
    entries.unshift({
      id: uid(),
      text: v,
      date: new Date().toISOString(),
      category: selectedCategory || '',
      parentId: replyToId || null,
      pinned: false,
      copyCount: 0
    });
    saveEntries();
    input.value = '';
    updateInputState();
    saveDraft();
    setReplyTo(null);
    renderList();
    toast('백업에 저장했습니다');
  });

  // Ctrl/Cmd + Enter 로 빠른 저장
  input.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault();
      $('saveBtn').click();
    }
  });

  // ============ 검색 ============
  const search = $('search'), searchClear = $('searchClear');
  search.addEventListener('input', () => {
    searchClear.classList.toggle('show', search.value.length > 0);
    renderList();
  });
  searchClear.addEventListener('click', () => {
    search.value = '';
    searchClear.classList.remove('show');
    renderList();
    search.focus();
  });

  // 검색어를 항목 텍스트 안에서 하이라이트 (대소문자 무시)
  function highlight(text, query) {
    const safe = esc(text);
    if (!query) return safe;
    const q = query.trim();
    if (!q) return safe;
    // esc 된 문자열 기준으로 검색 — 쿼리도 esc
    const eq = esc(q);
    const lc = safe.toLowerCase();
    const lq = eq.toLowerCase();
    let out = '', from = 0, idx;
    while ((idx = lc.indexOf(lq, from)) !== -1) {
      out += safe.slice(from, idx);
      out += '<mark>' + safe.slice(idx, idx + eq.length) + '</mark>';
      from = idx + eq.length;
    }
    out += safe.slice(from);
    return out;
  }

  // ============ 목록 렌더링 ============
  const list = $('list');

  // 표시 순서 정리: 원본 바로 뒤에 그 후속 OOC들이 오도록 배치
  function orderedEntries(src) {
    const byId = {};
    src.forEach(e => { byId[e.id] = e; });
    const childrenOf = {};
    src.forEach(e => {
      // 부모가 현재 목록에 있을 때만 자식으로 취급
      if (e.parentId && byId[e.parentId]) {
        (childrenOf[e.parentId] = childrenOf[e.parentId] || []).push(e);
      }
    });
    const result = [];
    const pushed = new Set();
    function addWithChildren(e) {
      if (pushed.has(e.id)) return;
      pushed.add(e.id);
      result.push(e);
      // 후속은 오래된→최신 순(작성 순서)으로
      const kids = (childrenOf[e.id] || []).slice().reverse();
      kids.forEach(addWithChildren);
    }
    // 최상위(부모 없음 또는 부모가 목록 밖)부터.
    // 고정(pinned)된 항목을 먼저, 그 다음 일반 항목.
    const tops = src.filter(e => !e.parentId || !byId[e.parentId]);
    tops.filter(e => e.pinned).forEach(addWithChildren);
    tops.filter(e => !e.pinned).forEach(addWithChildren);
    // 혹시 누락분(순환 등) 보정
    src.forEach(e => { if (!pushed.has(e.id)) result.push(e); });
    return result;
  }

  function renderList() {
    const q = search.value.trim().toLowerCase();
    const cat = catFilter.value;

    let filtered = entries.filter(e => {
      if (q && !e.text.toLowerCase().includes(q)) return false;
      if (cat === '__all__') return true;
      if (cat === '__none__') return !e.category;
      return e.category === cat;
    });

    // 카운트 표시
    const isFiltering = q || cat !== '__all__';
    $('count').textContent = isFiltering
      ? (filtered.length + '개 표시 / 전체 ' + entries.length + '개')
      : (entries.length + '개 항목');

    list.innerHTML = '';
    if (filtered.length === 0) {
      const div = document.createElement('div');
      div.className = 'empty';
      if (entries.length === 0) {
        div.innerHTML = '<div class="big">📝</div>아직 저장된 OOC가 없어요.<br>위에서 내용을 입력하고 저장해 보세요.';
      } else {
        div.innerHTML = '<div class="big">🔍</div>찾는 OOC가 없어요.<br>검색어나 분류 필터를 바꿔 보세요.';
      }
      list.appendChild(div);
      return;
    }

    // 검색·필터 없을 때만 후속을 원본 뒤로 정렬 (필터 중엔 평면 목록)
    const ordered = isFiltering ? filtered : orderedEntries(filtered);

    ordered.forEach(e => {
      const card = document.createElement('div');
      card.className = 'entry';
      const parent = e.parentId ? entries.find(x => x.id === e.parentId) : null;
      if (parent && !isFiltering) card.classList.add('is-reply');
      if (e.pinned) card.classList.add('is-pinned');

      // 상단 메타: 고정 표시 + 카테고리 배지 + 후속 표시
      const meta = document.createElement('div');
      meta.className = 'entry-meta';
      if (e.pinned) {
        const pb = document.createElement('span');
        pb.className = 'pin-badge';
        pb.innerHTML =
          '<svg viewBox="0 0 24 24" fill="currentColor" stroke="none">' +
          '<path d="M16 3l5 5-2 2-1-1-4 4v4l-2 2-3-3-4 4-1-1 4-4-3-3 2-2h4l4-4-1-1z"/></svg>고정됨';
        meta.appendChild(pb);
      }
      if (e.category) {
        const badge = document.createElement('span');
        badge.className = 'cat-badge';
        badge.textContent = e.category;
        meta.appendChild(badge);
      }
      if (parent) {
        const rb = document.createElement('span');
        rb.className = 'reply-badge';
        const short = parent.text.length > 24 ? parent.text.slice(0, 24) + '…' : parent.text;
        rb.innerHTML =
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" ' +
          'stroke-linecap="round" stroke-linejoin="round">' +
          '<polyline points="9 17 4 12 9 7"/><path d="M20 18v-2a4 4 0 0 0-4-4H4"/></svg>';
        rb.appendChild(document.createTextNode('후속: ' + short));
        meta.appendChild(rb);
      }
      if (meta.children.length) card.appendChild(meta);

      // 제목 줄 — 자동 제목 + 글자 수/복사 횟수
      const title = autoTitle(e.text);
      const titleRow = document.createElement('div');
      titleRow.className = 'entry-title-row';
      const tEl = document.createElement('div');
      tEl.className = 'entry-title';
      tEl.innerHTML = title ? highlight(title, q) : '<span class="no-title">제목 없음</span>';
      titleRow.appendChild(tEl);
      const meta2 = document.createElement('span');
      meta2.className = 'entry-len';
      let metaText = e.text.length.toLocaleString() + '자';
      if (e.copyCount > 0) metaText += ' · 복사 ' + e.copyCount + '회';
      meta2.textContent = metaText;
      titleRow.appendChild(meta2);
      card.appendChild(titleRow);

      // 본문 (검색어는 본문 부분만 하이라이트)
      const body = document.createElement('div');
      body.className = 'entry-text';
      body.innerHTML = oocToHtml(e.text, inner => highlight(inner, q));
      card.appendChild(body);

      // 긴 내용이면 접기
      const isLong = e.text.length > 220 || e.text.split('\n').length > 6;
      if (isLong) {
        body.classList.add('clamped');
        const fold = document.createElement('button');
        fold.className = 'toggle-fold';
        const chevron = down =>
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" ' +
          'stroke-linecap="round" stroke-linejoin="round"><polyline points="' +
          (down ? '6 9 12 15 18 9' : '18 15 12 9 6 15') + '"/></svg>';
        const setFold = folded => {
          body.classList.toggle('clamped', folded);
          fold.innerHTML = (folded ? '펼치기' : '접기') + chevron(folded);
        };
        setFold(true);
        fold.addEventListener('click', () => {
          setFold(!body.classList.contains('clamped'));
        });
        card.appendChild(fold);
      }

      const foot = document.createElement('div');
      foot.className = 'entry-foot';

      const btns = document.createElement('div');
      btns.className = 'entry-btns';

      // 아이콘 버튼 헬퍼
      function iconBtn(svg, title, onClick, extraClass) {
        const b = document.createElement('button');
        b.className = 'ent-icon' + (extraClass ? ' ' + extraClass : '');
        b.title = title;
        b.innerHTML = svg;
        b.addEventListener('click', onClick);
        return b;
      }
      const SVG = {
        copy: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
          '<rect x="9" y="9" width="13" height="13" rx="2"/>' +
          '<path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>',
        swap: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
          '<polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/>' +
          '<polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>',
        reply: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
          '<polyline points="9 17 4 12 9 7"/><path d="M20 18v-2a4 4 0 0 0-4-4H4"/></svg>',
        tag: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
          '<path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/>' +
          '<line x1="7" y1="7" x2="7.01" y2="7"/></svg>',
        edit: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
          '<path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>' +
          '<path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>',
        del: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
          '<polyline points="3 6 5 6 21 6"/>' +
          '<path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>',
        pin: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
          '<path d="M16 3l5 5-2 2-1-1-4 4v4l-2 2-3-3-4 4-1-1 4-4-3-3 2-2h4l4-4-1-1z"/></svg>'
      };

      // 복사 후 사용 횟수 +1
      function bumpCount() {
        e.copyCount = (e.copyCount || 0) + 1;
        saveEntries();
        renderList();
      }

      // 고정/해제
      const pinBtn = iconBtn(SVG.pin, e.pinned ? '고정 해제' : '맨 위에 고정', () => {
        e.pinned = !e.pinned;
        saveEntries();
        renderList();
        toast(e.pinned ? '맨 위에 고정했습니다' : '고정을 해제했습니다');
      }, e.pinned ? 'pinned' : '');
      btns.appendChild(pinBtn);

      btns.appendChild(iconBtn(SVG.copy, 'OOC 형식으로 복사', () => {
        copyText(toOOC(e.text), 'OOC를 복사했습니다');
        bumpCount();
      }));
      btns.appendChild(iconBtn(SVG.swap, 'PC↔NPC 바꿔서 복사', () => {
        copyText(toOOC(swapPcNpc(e.text)), 'PC↔NPC를 바꿔 복사했습니다');
        bumpCount();
      }));
      btns.appendChild(iconBtn(SVG.reply, '후속 OOC 작성', () => {
        setReplyTo(e.id);
        toast('후속 OOC 작성 모드 — 위 입력칸에 작성하세요');
      }));
      btns.appendChild(iconBtn(SVG.tag, '카테고리 지정', () => {
        openCatPicker(e.id);
      }));
      btns.appendChild(iconBtn(SVG.edit, '내용 수정', () => {
        openEdit(e.id);
      }));
      btns.appendChild(iconBtn(SVG.del, '삭제', () => {
        askDelete(e.id, e.text);
      }, 'del'));

      foot.appendChild(btns);
      card.appendChild(foot);
      list.appendChild(card);
    });
  }

  // ============ 전체 복사 ============
  $('copyAll').addEventListener('click', () => {
    const q = search.value.trim().toLowerCase();
    const cat = catFilter.value;
    const target = entries.filter(e => {
      if (q && !e.text.toLowerCase().includes(q)) return false;
      if (cat === '__all__') return true;
      if (cat === '__none__') return !e.category;
      return e.category === cat;
    });
    if (target.length === 0) { toast('복사할 항목이 없습니다'); return; }
    // 오래된 것부터 위로 오도록, 후속은 원본 뒤에 오도록 정렬해 합침
    const ordered = orderedEntries(target).slice().reverse();
    const joined = ordered.map(e => toOOC(e.text)).join('\n');
    copyText(joined, target.length + '개 OOC를 모두 복사했습니다');
  });

  // ============ 삭제 ============
  const delOverlay = $('delOverlay');
  let pendingDelId = null;
  function askDelete(id, text) {
    pendingDelId = id;
    const short = text.length > 40 ? text.slice(0, 40) + '…' : text;
    $('delBody').textContent = '"' + short + '" 항목을 삭제합니다. 되돌릴 수 없습니다.';
    delOverlay.classList.add('show');
  }
  $('delCancel').addEventListener('click', () => {
    delOverlay.classList.remove('show');
    pendingDelId = null;
  });
  $('delConfirm').addEventListener('click', () => {
    if (pendingDelId) {
      entries = entries.filter(e => e.id !== pendingDelId);
      saveEntries();
      renderList();
      toast('항목을 삭제했습니다');
    }
    delOverlay.classList.remove('show');
    pendingDelId = null;
  });
  delOverlay.addEventListener('click', e => {
    if (e.target === delOverlay) { delOverlay.classList.remove('show'); pendingDelId = null; }
  });
  window.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      delOverlay.classList.remove('show'); pendingDelId = null;
      $('catOverlay').classList.remove('show');
      editOverlay.classList.remove('show'); editTargetId = null;
    }
  });

  // ============ 테마 ============
  const themeIcon = $('themeIcon');
  const sun = '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>';
  const moon = '<path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/>';
  function applyTheme(t) {
    document.body.dataset.theme = t;
    themeIcon.innerHTML = t === 'dark' ? moon : sun;
  }
  applyTheme(localStorage.getItem(THEME_KEY) || 'light');
  $('themeBtn').addEventListener('click', () => {
    const next = document.body.dataset.theme === 'dark' ? 'light' : 'dark';
    applyTheme(next);
    try { localStorage.setItem(THEME_KEY, next); } catch {}
  });

  // ============ 데이터 백업 (내보내기 / 가져오기) ============
  // 내보내기: 모든 OOC + 카테고리를 JSON 파일로 저장
  $('exportBtn').addEventListener('click', () => {
    if (entries.length === 0) { toast('백업할 내용이 없습니다'); return; }
    const data = {
      type: 'ooc-backup',
      version: 1,
      exportedAt: new Date().toISOString(),
      entries: entries,
      categories: categories
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    const d = new Date();
    const p = n => String(n).padStart(2, '0');
    a.download = 'ooc-backup-' + d.getFullYear() + p(d.getMonth() + 1) + p(d.getDate()) + '.json';
    a.click();
    URL.revokeObjectURL(a.href);
    toast('백업 파일을 내보냈습니다');
  });

  // 가져오기: JSON 파일을 읽어 기존 내용에 합침 (중복 id 는 건너뜀)
  $('importBtn').addEventListener('click', () => $('importFile').click());
  $('importFile').addEventListener('change', e => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        const imported = Array.isArray(data) ? data : data.entries;
        if (!Array.isArray(imported)) throw new Error('형식 오류');
        // 카테고리 합치기
        const impCats = (data && Array.isArray(data.categories)) ? data.categories : [];
        impCats.forEach(c => { if (c && !categories.includes(c)) categories.push(c); });
        categories.sort((a, b) => a.localeCompare(b, 'ko'));
        // 항목 합치기 (이미 있는 id 는 건너뜀)
        const existIds = new Set(entries.map(en => en.id));
        let added = 0;
        imported.forEach(en => {
          if (!en || typeof en.text !== 'string') return;
          if (en.id && existIds.has(en.id)) return;
          entries.push({
            id: en.id || uid(),
            text: en.text,
            date: en.date || new Date().toISOString(),
            category: en.category || '',
            parentId: en.parentId || null,
            pinned: !!en.pinned,
            copyCount: en.copyCount || 0
          });
          added++;
        });
        // 최신순 정렬 (date 내림차순)
        entries.sort((a, b) => (a.date < b.date ? 1 : -1));
        saveEntries();
        refreshCatFilter();
        renderList();
        toast(added + '개 항목을 불러왔습니다');
      } catch {
        toast('백업 파일을 읽을 수 없습니다');
      }
      $('importFile').value = '';
    };
    reader.readAsText(file);
  });

  // ============ 초기화 ============
  refreshCatFilter();
  updateCatBtn();
  restoreDraft();
  updateInputState();
  renderList();
</script>
</body>
</html>
