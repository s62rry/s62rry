<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>포켓몬 트레이너 카드 메이커</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2107@1.1/Galmuri11.woff2');
  @font-face{font-family:'Galmuri';src:url('https://cdn.jsdelivr.net/gh/quiple/galmuri/dist/Galmuri11.woff2') format('woff2');font-weight:400;font-display:swap;}
  @font-face{font-family:'GalmuriB';src:url('https://cdn.jsdelivr.net/gh/quiple/galmuri/dist/Galmuri11-Bold.woff2') format('woff2');font-weight:700;font-display:swap;}
  :root{
    --bg:#eceef1;--panel:#ffffff;--ink:#28282e;--muted:#6b6456;--line:#28282e;
    --accent:#e85050;--accent-soft:#fdecec;--gold:#f2c14e;--blue:#3a6ea5;--shadow:none;--border:#cfcfcf;--border-soft:#e6e6e6;
    --pxl:1px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'Galmuri','GalmuriB',monospace;color:var(--ink);
    background:var(--bg);
    padding:24px 14px 70px;line-height:1.5;
  }

  *{scrollbar-width:thin;scrollbar-color:#c7ccd4 transparent;}
  ::-webkit-scrollbar{width:10px;height:10px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:#c7ccd4;border-radius:999px;border:2px solid var(--bg);}
  ::-webkit-scrollbar-thumb:hover{background:#aab0ba;}
  .suggest::-webkit-scrollbar{width:8px;}
  .suggest::-webkit-scrollbar-thumb{background:#d0d4db;border:2px solid #fff;border-radius:999px;}

  svg{image-rendering:pixelated;}
  .top{max-width:1120px;margin:0 auto 22px;text-align:center;}
  .top h1{font-family:'GalmuriB',monospace;font-size:20px;color:#28282e;letter-spacing:1px;}
  .top p{font-size:11px;color:#7a7f87;margin-top:8px;}

  .layout{max-width:1120px;margin:0 auto;display:grid;grid-template-columns:1fr;gap:24px;}
  @media(min-width:980px){.layout{grid-template-columns:minmax(0,1fr) 380px;align-items:start;} .card-col{position:sticky;top:20px;}}

  
  .card-col{position:static;}
  /* ===== CARD ===== */
  .card{background:#ffffff;border:1px solid var(--border);border-radius:16px;position:relative;overflow:hidden;}
  .card-banner{background:var(--accent);border-bottom:1px solid var(--border);padding:15px 18px;color:#fff;display:flex;align-items:center;gap:12px;position:relative;}
    .pball-ico{width:28px;height:28px;flex:0 0 auto;}
  .tr-info{flex:1;min-width:0;position:relative;}
  .tr-name{font-family:'GalmuriB',monospace;font-size:16px;line-height:1.2;word-break:break-all;}
  .tr-sub{font-size:10px;margin-top:4px;display:flex;gap:10px;flex-wrap:wrap;}
  .tr-sub span{display:inline-flex;gap:3px;}

  .card-body{display:grid;grid-template-columns:184px 1fr;}
  @media(max-width:520px){.card-body{grid-template-columns:1fr;}}
  .trainer-side{padding:0;border-right:1px solid var(--border-soft);display:flex;flex-direction:column;background:#fafafa;}
  @media(max-width:520px){.trainer-side{border-right:none;border-bottom:1px solid var(--border-soft);}}
  .tr-portrait{width:100%;flex:1;min-height:160px;background:transparent;border:none;overflow:hidden;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;}
  .tr-portrait img{display:block;width:100%;height:auto;transform-origin:center center;transition:transform .08s ease;}
  .tr-portrait .ph{font-size:9px;color:var(--muted);text-align:center;padding:0 8px;line-height:1.7;}
  
  .mons-side{padding:16px 16px;display:grid;grid-template-columns:1fr 1fr;gap:16px 12px;}
  @media(max-width:520px){.mons-side{grid-template-columns:1fr;}}
  .mon{border:1px solid var(--border-soft);border-radius:10px;padding:10px;display:flex;gap:10px;align-items:center;background:#fff;min-height:64px;position:relative;}
  .mon.empty{background:#fafafa;border-radius:10px;align-items:center;justify-content:center;font-size:10px;color:var(--muted);}
  .mon-img{width:48px;height:48px;flex:0 0 auto;background:transparent;border:none;overflow:visible;display:flex;align-items:center;justify-content:center;position:relative;}
  .mon-img .clip{width:100%;height:100%;overflow:visible;display:flex;align-items:center;justify-content:center;background:transparent;}
  .mon-img img{width:100%;height:100%;object-fit:contain;image-rendering:auto;}
  .mon-img .mb{width:22px;height:22px;}
  /* pixel ball perched OUTSIDE top-right, no shadow */
  .mon-img .ballbadge{position:absolute;top:-5px;right:-5px;width:13px;height:13px;z-index:3;}
  .mon-img .spark{position:absolute;top:-9px;left:-3px;font-size:13px;z-index:3;color:#f5b301;}
  .mon-info{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;gap:5px;}
  .mon-nm{font-family:'GalmuriB',monospace;font-size:11px;line-height:1;display:flex;align-items:center;gap:6px;}
  .mon-nm .nm-ball{width:14px;height:14px;flex:0 0 auto;display:flex;}
  .mon-nm .nm-ball svg{width:14px;height:14px;}
  .mon-nm .nm-txt{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

  .mon-tags{display:flex;flex-wrap:wrap;gap:4px;margin:0;align-items:center;line-height:1;}
  .chip{font-size:8px;height:16px;line-height:1;padding:0 7px 1px;background:#eceae2;color:#5a544a;border:none;border-radius:4px;display:inline-flex;align-items:center;justify-content:center;vertical-align:middle;box-sizing:border-box;}
  .chip.tp{color:#fff;}
  .tp-노말{background:#9099a1}.tp-불꽃{background:#f0683a}.tp-물{background:#3a86d0}
  .tp-풀{background:#52b04a}.tp-전기{background:#e0b020}.tp-얼음{background:#4ab8b0}
  .tp-격투{background:#c03a5a}.tp-독{background:#9040b0}.tp-땅{background:#c86848}
  .tp-비행{background:#7a96d0}.tp-에스퍼{background:#e85068}.tp-벌레{background:#80b020}
  .tp-바위{background:#a89868}.tp-고스트{background:#4858a0}.tp-드래곤{background:#2256c8}
  .tp-악{background:#3a3a48}.tp-강철{background:#4a7e90}.tp-페어리{background:#e07fb8}

  .save-btn{width:100%;margin-top:16px;padding:14px;border:none;border-radius:12px;background:var(--accent);color:#fff;font-family:'GalmuriB',monospace;font-size:13px;cursor:pointer;letter-spacing:1px;transition:filter .12s;}

  .modal-overlay{position:fixed;inset:0;background:rgba(28,28,34,.45);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;}
  .modal-box{background:#fff;border-radius:18px;padding:26px 24px 20px;max-width:300px;width:100%;text-align:center;animation:popin .18s ease;}
  @keyframes popin{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
  .modal-emoji{font-size:34px;margin-bottom:8px;}
  .modal-title{font-family:'GalmuriB',monospace;font-size:15px;color:var(--ink);margin-bottom:8px;}
  .modal-desc{font-size:11px;color:var(--muted);line-height:1.7;margin-bottom:18px;}
  .modal-btns{display:flex;gap:8px;}
  .modal-cancel,.modal-confirm{flex:1;padding:12px;border-radius:10px;font-family:'GalmuriB',monospace;font-size:12px;cursor:pointer;border:none;}
  .modal-cancel{background:#f0f0f2;color:var(--muted);}
  .modal-cancel:hover{background:#e6e6e8;}
  .modal-confirm{background:var(--accent);color:#fff;}
  .modal-confirm:hover{filter:brightness(1.06);}
  .reset-btn{padding:14px 16px;border:1px solid var(--border);border-radius:12px;background:#fff;color:var(--muted);font-family:'GalmuriB',monospace;font-size:12px;cursor:pointer;flex:0 0 auto;}
  .reset-btn:hover{background:#f4f4f4;}
  .save-btn:hover{filter:brightness(1.06);}
  .save-btn:active{filter:brightness(.94);}

  /* ===== FORM PANEL ===== */
  .panel{background:#ffffff;border:1px solid var(--border);border-radius:14px;padding:16px;}
  .panel h2{font-family:'GalmuriB',monospace;font-size:12px;margin-bottom:12px;display:flex;align-items:center;gap:7px;letter-spacing:1px;}
  .panel-h2{display:flex;align-items:center;justify-content:space-between;border-radius:8px;padding:4px 6px;margin:-4px -6px 8px;transition:background .12s;}
  .panel-h2.h2-collapsed{margin:-4px -6px 0;}
  .panel-h2 > span{display:flex;align-items:center;gap:7px;}
  .collapse-btn{border:none;background:none;cursor:pointer;font-size:14px;color:var(--muted);padding:4px 8px;line-height:1;border-radius:6px;transition:transform .15s,background .12s,color .12s;}
  .collapse-btn:hover{background:var(--accent-soft);color:var(--accent);}
  .collapse-btn.collapsed{transform:rotate(-90deg);}

  .panel h2 .dot{width:8px;height:8px;background:var(--accent);border-radius:50%;}
  .field{margin-bottom:11px;position:relative;}
  .field label{display:block;font-size:9px;color:var(--muted);margin-bottom:4px;letter-spacing:.5px;}
  input[type=text],select{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:8px;background:#fff;color:var(--ink);font-family:'Galmuri',monospace;font-size:12px;}
  input:focus,select:focus{outline:none;background:#fffbe8;}
  .row3{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
  .tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:13px;}
  .tab{flex:1;min-width:36px;padding:7px 0;border:1px solid var(--border);border-radius:8px;background:#fff;font-family:'GalmuriB',monospace;font-size:11px;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;}
  .tab.active{background:var(--accent);color:#fff;}
  .tab .filled{width:5px;height:5px;background:var(--accent);}
  .tab.active .filled{background:#fff;}
  .ball-picker{display:grid;grid-template-columns:repeat(auto-fill,minmax(40px,1fr));gap:5px;}
  .ball-opt{cursor:pointer;border:2px solid transparent;border-radius:8px;padding:4px;background:#fff;display:flex;align-items:center;justify-content:center;}
  .ball-opt svg{width:30px;height:30px;display:block;}
  .ball-opt.sel{border:1px solid var(--accent);background:var(--accent-soft);}

  .ball-opt{position:relative;}
  .ball-opt::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;font-family:'Galmuri',monospace;font-size:9px;padding:3px 6px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .1s;z-index:30;}
  .ball-opt::before{content:"";position:absolute;bottom:calc(100% + 1px);left:50%;transform:translateX(-50%);border:4px solid transparent;border-top-color:var(--ink);opacity:0;pointer-events:none;transition:opacity .1s;z-index:30;}
  .ball-opt:hover::after,.ball-opt:hover::before{opacity:1;}
  .autonote{font-size:9px;color:var(--blue);margin-top:5px;min-height:12px;}
  .suggest{position:absolute;z-index:20;left:0;right:0;top:100%;background:#fff;border:1px solid var(--border);border-radius:8px;max-height:230px;overflow:auto;margin-top:3px;display:none;}
  .suggest.show{display:block;}
  .sug-item{display:flex;align-items:center;gap:8px;padding:6px 9px;cursor:pointer;font-size:11px;border-bottom:1px solid #efeadd;}
  .sug-item:hover,.sug-item.hl{background:#fffbe8;}
  .sug-item img{width:30px;height:30px;object-fit:contain;image-rendering:auto;}
  .sug-item .sname{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .sug-item .st{font-size:8px;padding:2px 6px;color:#fff;border:none;border-radius:4px;line-height:1;}
  .imgrow{display:flex;gap:8px;align-items:center;}
  .imgrow .prev{width:42px;height:42px;background:#eee;border:1px solid var(--border);border-radius:8px;overflow:hidden;flex:0 0 auto;display:flex;align-items:center;justify-content:center;}
  .imgrow .prev img{width:100%;height:100%;object-fit:contain;image-rendering:auto;}
  .upbtn{flex:1;padding:8px;border:1px solid var(--border);border-radius:8px;background:#fff;cursor:pointer;font-family:'Galmuri',monospace;font-size:10px;color:var(--muted);}



  input[type=range]{width:100%;-webkit-appearance:none;appearance:none;height:6px;border-radius:999px;background:#e2e2e2;border:none;outline:none;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:15px;height:15px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;}
  input[type=range]::-moz-range-thumb{width:15px;height:15px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;}


  .icon-custom{width:38px;min-width:38px;max-width:38px;flex:0 0 auto;padding:0;text-align:center;font-size:13px;color:var(--ink);outline:none;}
  .icon-custom::placeholder{font-size:9px;color:var(--muted);}

  .swatches-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .sw-pick{position:relative;width:20px;height:20px;border-radius:5px;border:1px solid var(--border);cursor:pointer;flex:0 0 auto;overflow:hidden;margin-left:3px;}
  .sw-pick input[type=color]{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer;border:none;padding:0;}
  .sw-pick .pick-hint{position:absolute;right:-1px;bottom:-1px;width:9px;height:9px;background:conic-gradient(red,orange,yellow,lime,cyan,blue,magenta,red);border-top-left-radius:4px;border:1px solid #fff;}
  .color-pick{width:22px;height:22px;padding:0;border:none;background:none;cursor:pointer;-webkit-appearance:none;appearance:none;}
  .color-pick::-webkit-color-swatch-wrapper{padding:0;}
  .color-pick::-webkit-color-swatch{border:1px solid var(--border);border-radius:3px;}
  .color-pick::-moz-color-swatch{border:1px solid var(--border);border-radius:3px;}
  .icon-picker{display:flex;flex-wrap:wrap;gap:6px;}
  .icon-opt{min-width:30px;height:30px;padding:0 6px;border:1px solid var(--border);border-radius:7px;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--muted);}
  .icon-opt svg{width:18px;height:18px;}
  .icon-opt svg path,.icon-opt svg rect,.icon-opt svg circle{fill:#444 !important;stroke:#444 !important;}
  .icon-opt.sel{border:1px solid var(--accent);background:var(--accent-soft);}
  .swatches{display:flex;flex-wrap:nowrap;gap:5px;align-items:center;}
  .sw-opt{width:20px;height:20px;border:1px solid var(--border);border-radius:5px;cursor:pointer;position:relative;flex:0 0 auto;}
  .sw-opt.sel::after{content:"✓";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;}
  .shiny-toggle{display:flex;align-items:center;gap:8px;margin-top:8px;padding:8px 10px;border:1px solid var(--border);border-radius:8px;background:#fff;cursor:pointer;font-size:11px;user-select:none;}
  .shiny-toggle.on{background:#fff6d8;color:#9a7400;}
  .sw{width:32px;height:16px;background:#d8d8d8;border:none;border-radius:999px;position:relative;flex:0 0 auto;}
  .sw::after{content:"";position:absolute;top:1px;left:1px;width:14px;height:14px;border-radius:50%;background:#fff;}
  .shiny-toggle.on .sw{background:var(--gold);}
  .shiny-toggle.on .sw::after{left:16px;}
</style>
</head>
<body>
  <div class="top">
    <h1>포켓몬 트레이너 카드 메이커</h1>
    <p>이로치 · 다양한 폼 · 듀얼타입 · 픽셀 몬스터볼 20종</p>
  </div>
  <div class="layout">
    <div class="card-col">
      <div class="card" id="card">
        
        
        <div class="card-banner">
          
          <span class="pball-ico" id="bannerIcon"></span>
          <div class="tr-info"><div class="tr-name" id="vName">트레이너</div><div class="tr-sub" id="vSub"></div></div>
        </div>
        <div class="card-body">
          <div class="trainer-side">
            <div class="tr-portrait" id="trPortrait" onclick="document.getElementById('trImg').click()"><span class="ph">▢<br>이미지<br>추가</span></div>
            
            <input type="file" id="trImg" accept="image/*" hidden>
          </div>
          <div class="mons-side" id="monsSide"></div>
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-top:16px"><button class="save-btn" style="margin-top:0;flex:1" onclick="downloadCard(event)">▼ 카드 이미지로 저장</button><button class="reset-btn" onclick="resetAll()">초기화</button></div>
    </div>
    <div>
      <div class="panel" style="margin-bottom:18px;">
        <h2 class="panel-h2"><span><span class="dot"></span>트레이너 정보</span><button class="collapse-btn" id="trCollapse" onclick="togglePanel('trBody','trCollapse')">▾</button></h2>
        <div id="trBody">
        <div class="field"><label>이름</label><input type="text" id="fName" placeholder="예: 레드" oninput="render()"></div>
        <div class="row3">
          <div class="field"><label>나이</label><input type="text" id="fAge" placeholder="예: 16" oninput="render()"></div>
          <div class="field"><label>성별</label><select id="fGender" onchange="render()"><option value="">선택</option><option value="♂">♂ 남성</option><option value="♀">♀ 여성</option><option value="그 외">그 외</option></select></div>
        </div>
        <div class="field"><label>직업</label><input type="text" id="fJob" placeholder="예: 챔피언" oninput="render()"></div>
        <div class="field"><label>카드 윗부분 색상</label><div class="swatches" id="bannerSwatches"></div></div>
        <div class="field"><label>카드 앞 아이콘</label><div class="icon-picker" id="iconPicker"></div></div>
        <div class="field"><label>트레이너 이미지</label>
          <div class="imgrow"><div class="prev" id="trPrev"><span style="font-size:9px;color:#999">없음</span></div>
          <button type="button" class="upbtn" onclick="document.getElementById('trImg').click()">▢ 이미지 업로드</button></div>
        </div>
        <div id="trAdjust" style="display:none">
          <div class="field"><label>확대/축소 <span id="zoomVal" style="color:var(--blue)"></span></label>
            <input type="range" id="zoomR" min="0.5" max="3" step="0.05" value="1" oninput="setImgAdj('zoom',this.value)"></div>
          <div class="row3">
            <div class="field"><label>좌우 위치</label><input type="range" id="xR" min="-60" max="60" step="1" value="0" oninput="setImgAdj('x',this.value)"></div>
            <div class="field"><label>상하 위치</label><input type="range" id="yR" min="-60" max="60" step="1" value="0" oninput="setImgAdj('y',this.value)"></div>
          </div>
          <button type="button" class="upbtn" style="width:100%" onclick="resetImgAdj()">↩ 위치 초기화</button>
        </div>
      </div></div>
      <div class="panel">
        <h2 class="panel-h2"><span><span class="dot"></span>포켓몬 파티</span><button class="collapse-btn" id="partyCollapse" onclick="togglePanel('partyBody','partyCollapse')">▾</button></h2>
        <div id="partyBody">
        <div class="tabs" id="tabs"></div>
        <div id="entry"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="resetModal" class="modal-overlay" style="display:none">
    <div class="modal-box">
      <div class="modal-emoji">🗑️</div>
      <div class="modal-title">정말 초기화할까요?</div>
      <div class="modal-desc">작업한 트레이너와 포켓몬 정보가<br>모두 사라져요. 되돌릴 수 없어요!</div>
      <div class="modal-btns">
        <button class="modal-cancel" onclick="closeResetModal()">취소</button>
        <button class="modal-confirm" onclick="doReset()">초기화하기</button>
      </div>
    </div>
  </div>
<script>
const TYPES=["노말","불꽃","물","풀","전기","얼음","격투","독","땅","비행","에스퍼","벌레","바위","고스트","드래곤","악","강철","페어리"];
const GENDERS=["♂ 수컷","♀ 암컷","무성별"];
const SIZES=["XXXS","XXS","XS","S","M","L","XL","XXL","XXXL"];

function buildIcons(){

  const presets=ICON_KEYS.map(k=>`<div class="icon-opt ${state.headerIcon===k?'sel':''}" onclick="setIcon('${k}')">${HEADER_ICONS[k]||k}</div>`).join('');

}

function setCustomIcon(v){
  if(v.trim()===''){state.headerIcon='없음';}
  else{state.headerIcon='__custom__:'+v;}
  // update preset highlight without rebuilding the input (keep focus)
  const opts=document.querySelectorAll('#iconPicker .icon-opt');
  opts.forEach(o=>{ if(!o.classList.contains('icon-custom')) o.classList.remove('sel'); });
  const ci=document.getElementById('customIcon');
  if(ci){ if(v.trim()==='') ci.classList.remove('sel'); else ci.classList.add('sel'); }
  render();
}

      '<label id="pickLabel" class="sw-pick" title="직접 색상 고르기"><span class="pick-hint"></span><input type="color" id="bannerColorPick" value="'+state.banner+'" oninput="setBanner(this.value)"></label>';
    chipWrap=document.getElementById('chipWrap');
    pickLabel=document.getElementById('pickLabel');
  }
  // picker chip shows the currently selected color
  if(pickLabel){ pickLabel.style.background=state.banner; }
  chipWrap.innerHTML=BANNER_COLORS.map(c=>`<div class="sw-opt ${state.banner===c?'sel':''}" data-color="${c}" style="background:${c}" onclick="setBanner('${c}')"></div>`).join('');
}
function hexToSoft(hex){
  // returns a very light tint of the given hex color
  let c=hex.replace('#','');
  if(c.length===3)c=c.split('').map(x=>x+x).join('');
  if(c.length!==6)return '#fdecec';
  const r=parseInt(c.slice(0,2),16),g=parseInt(c.slice(2,4),16),b=parseInt(c.slice(4,6),16);
  const mix=(v)=>Math.round(v+(255-v)*0.88); // 88% toward white
  return 'rgb('+mix(r)+','+mix(g)+','+mix(b)+')';
}
function setBanner(c){
  state.banner=c;
  document.querySelectorAll('#bannerSwatches .sw-opt').forEach(function(el){
    el.classList.toggle('sel', el.getAttribute('data-color')===c);
  });
  const cp=document.getElementById('bannerColorPick');if(cp&&cp.value!==c&&/^#/.test(c))cp.value=c;
  const pl=document.getElementById('pickLabel');if(pl)pl.style.background=c;
  document.documentElement.style.setProperty('--accent', c);
  document.documentElement.style.setProperty('--accent-soft', hexToSoft(c));
  render();
}

function togglePanel(bodyId,btnId){
  const body=document.getElementById(bodyId);
  const btn=document.getElementById(btnId);
  if(!body)return;
  const hidden=body.style.display==='none';
  body.style.display=hidden?'':'none';
  if(btn)btn.classList.toggle('collapsed',!hidden);
  const h2=btn?btn.closest('h2'):null;
  if(h2)h2.classList.toggle('h2-collapsed',!hidden);
}
function buildTabs(){
  document.getElementById('tabs').innerHTML=state.mons.map((m,i)=>{
    const f=m.name||m.type||m.gender||m.size||m.ability||m.nature||m.img;
    return `<button class="tab ${i===state.active?'active':''}" onclick="setTab(${i})">${i+1}${f?'<span class="filled"></span>':''}</button>`;
  }).join('');
}
function setTab(i){state.active=i;buildTabs();buildEntry();}
function buildEntry(){
  const m=state.mons[state.active];const prev=curImg(m);
  document.getElementById('entry').innerHTML=`
    <div class="field"><label>이름 (입력하면 이미지·타입 자동 / 메가·알로라 등 폼 검색)</label>
      <input type="text" id="mName" autocomplete="off" placeholder="예: 리자몽, 리자몽 (메가X)" value="${m.name.replace(/"/g,'&quot;')}" oninput="onName(this.value)" onkeydown="sugKey(event)" onblur="setTimeout(hideSug,150)">
      <div class="suggest" id="suggest"></div>
      <div class="autonote" id="autoNote"></div></div>
    <div class="shiny-toggle ${m.shiny?'on':''}" id="shinyT" onclick="toggleShiny()"><div class="sw"></div><span>✦ 이로치(색이 다른 포켓몬)</span></div>
    <div class="field" style="margin-top:11px"><label>이미지 (자동 / 직접 업로드 가능)</label>
      <div class="imgrow">
        <div class="prev" id="mPrev">${prev?`<img src="${prev}">`:`<span style="font-size:9px;color:#999">없음</span>`}</div>
        <button type="button" class="upbtn" onclick="document.getElementById('mImg').click()">${m.img?'✓ 직접 올린 이미지 — 변경':'▢ 직접 이미지 업로드'}</button>
        ${m.img?`<button type="button" class="upbtn" style="flex:0 0 auto" onclick="clearImg()">↩ 자동</button>`:''}
      </div>
      <input type="file" id="mImg" accept="image/*" hidden></div>
    <div class="row3">
      <div class="field"><label>타입 1</label><select id="mType" onchange="upd('type',this.value)"><option value="">선택</option>${TYPES.map(t=>opt(t,m.type)).join('')}</select></div>
      <div class="field"><label>타입 2</label><select id="mType2" onchange="upd('type2',this.value)"><option value="">없음</option>${TYPES.map(t=>opt(t,m.type2)).join('')}</select></div>
      <div class="field"><label>성별</label><select onchange="upd('gender',this.value)"><option value="">선택</option>${GENDERS.map(g=>opt(g,m.gender)).join('')}</select></div>
      <div class="field"><label>사이즈</label><select onchange="upd('size',this.value)"><option value="">선택</option>${SIZES.map(s=>opt(s,m.size)).join('')}</select></div>
    </div>
    <div class="field"><label>성격</label><select onchange="upd('nature',this.value)"><option value="">선택</option>${NATURES.map(n=>opt(n,m.nature)).join('')}</select></div>
    <div class="field"><label>특성 ${m.dex&&ABIL_BY_DEX[m.dex]?'(이 포켓몬의 특성)':''}</label><select id="mAbil" onchange="upd('ability',this.value)"><option value="">선택</option>${abilityOptions(m)}</select></div>
    <div class="field"><label>몬스터볼 (20종)</label><div class="ball-picker">${BALL_KEYS.map(k=>`<div class="ball-opt ${m.ball===k?'sel':''}" data-tip="${k}" onclick="upd('ball','${k}')">${BALLS[k]}</div>`).join('')}</div></div>`;
  document.getElementById('mImg').addEventListener('change',e=>{
    const f=e.target.files[0];if(!f)return;const r=new FileReader();
    r.onload=ev=>{state.mons[state.active].img=ev.target.result;buildEntry();render();};r.readAsDataURL(f);
  });
}
function clearImg(){state.mons[state.active].img=null;buildEntry();render();}
function toggleShiny(){const m=state.mons[state.active];m.shiny=!m.shiny;buildEntry();render();}
let sugIdx=-1, sugList=[];
function applyMon(name){
  const m=state.mons[state.active];const d=POKE[name];if(!d)return;
  m.dex=d[0];m.type=d[1];m.type2=d[2]||"";
  var ab=ABIL_BY_DEX[m.dex];
  if(ab && ab.length){ if(!ab.includes(m.ability)) m.ability=ab[0]; }
  const t=document.getElementById('mType');if(t)t.value=m.type;
  const t2=document.getElementById('mType2');if(t2)t2.value=m.type2;
  const asel=document.getElementById('mAbil');
  if(asel){asel.innerHTML='<option value="">선택</option>'+abilityOptions(m);asel.value=m.ability;}
  const note=document.getElementById('autoNote');const tstr=m.type2?`${m.type}/${m.type2}`:m.type;
  if(note)note.textContent=`✓ ${name} (No.${m.dex}) · 타입 ${tstr}`;
  const p=document.getElementById('mPrev');if(p)p.innerHTML=`<img src="${sprite(m.dex,m.shiny)}">`;
}
function onName(v){
  const m=state.mons[state.active];m.name=v;
  if(POKE[v]){applyMon(v);} else {m.dex=null;const n=document.getElementById('autoNote');if(n)n.textContent="";}
  if(v.trim()){sugList=NAMES.filter(n=>n.indexOf(v)===0).slice(0,10);
    if(sugList.length<10){const more=NAMES.filter(n=>n.indexOf(v)>0).slice(0,10-sugList.length);sugList=sugList.concat(more);}
  } else sugList=[];
  renderSug();buildTabs();render();
}
function renderSug(){
  const box=document.getElementById('suggest');if(!box)return;sugIdx=-1;
  if(sugList.length===0){box.classList.remove('show');box.innerHTML='';return;}
  box.innerHTML=sugList.map((n,i)=>{const d=POKE[n];const t2=d[2]?`<span class="st tp-${d[2]}">${d[2]}</span>`:'';
    return `<div class="sug-item" data-i="${i}" onmousedown="pickSug(${i})"><img src="${sprite(d[0])}" loading="lazy"><span class="sname">${n}</span><span class="st tp-${d[1]}">${d[1]}</span>${t2}</div>`;}).join('');
  box.classList.add('show');
}
function pickSug(i){const n=sugList[i];const inp=document.getElementById('mName');if(inp)inp.value=n;state.mons[state.active].name=n;applyMon(n);hideSug();buildEntry();buildTabs();render();}
function hideSug(){const b=document.getElementById('suggest');if(b)b.classList.remove('show');}
function sugKey(e){
  const box=document.getElementById('suggest');if(!box||!box.classList.contains('show'))return;
  const items=box.querySelectorAll('.sug-item');
  if(e.key==='ArrowDown'){e.preventDefault();sugIdx=Math.min(sugIdx+1,items.length-1);}
  else if(e.key==='ArrowUp'){e.preventDefault();sugIdx=Math.max(sugIdx-1,0);}
  else if(e.key==='Enter'){if(sugIdx>=0){e.preventDefault();pickSug(sugIdx);}return;}
  else if(e.key==='Escape'){hideSug();return;}
  else return;
  items.forEach((it,i)=>it.classList.toggle('hl',i===sugIdx));
}
function upd(key,val){state.mons[state.active][key]=val;if(key==='ball')buildEntry();buildTabs();render();}
document.getElementById('trImg').addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=ev=>{state.image=ev.target.result;state.imgZoom=1;state.imgX=0;state.imgY=0;render();updTrPrevAndAdjust();const z=document.getElementById('zoomR');if(z)z.value=1;const x=document.getElementById('xR');if(x)x.value=0;const y=document.getElementById('yR');if(y)y.value=0;};r.readAsDataURL(f);
});
function render(){
  state.name=document.getElementById('fName').value;
  state.age=document.getElementById('fAge').value;
  state.job=document.getElementById('fJob').value;
  state.gender=document.getElementById('fGender').value;
  document.getElementById('vName').textContent=state.name||"트레이너";
  document.querySelector('.card-banner').style.background=state.banner;
  const bi=document.getElementById('bannerIcon');
  if(bi){
    if(state.headerIcon && state.headerIcon.indexOf('__custom__:')===0){
      const txt=state.headerIcon.slice(11);
      bi.innerHTML='<span style="font-size:20px;line-height:1">'+txt+'</span>';bi.style.display='';
    } else {
      const ic=HEADER_ICONS[state.headerIcon]||'';
      bi.innerHTML=ic;bi.style.display=ic?'':'none';
    }
  }
  const sub=[];if(state.age)sub.push(`<span>${state.age}세</span>`);if(state.gender)sub.push(`<span>${state.gender}</span>`);if(state.job)sub.push(`<span>${state.job}</span>`);
  document.getElementById('vSub').innerHTML=sub.join('');
  const p=document.getElementById('trPortrait');
  if(state.image){
    p.innerHTML=`<img src="${state.image}" style="transform:translate(${state.imgX}%,${state.imgY}%) scale(${state.imgZoom});">`;
  } else {
    p.innerHTML=`<span class="ph">▢<br>이미지<br>추가</span>`;
  }
  document.getElementById('monsSide').innerHTML=state.mons.map(m=>{
    const has=m.name||m.type||m.gender||m.size||m.ability||m.nature||m.img||m.dex;
    if(!has)return `<div class="mon empty"></div>`;
    const row1=[];const row2=[];
    if(m.type)row1.push(`<span class="chip tp tp-${m.type}">${m.type}</span>`);
    if(m.type2)row1.push(`<span class="chip tp tp-${m.type2}">${m.type2}</span>`);
    if(m.gender)row1.push(`<span class="chip">${m.gender.charAt(0)}</span>`);
    if(m.size)row1.push(`<span class="chip">${m.size}</span>`);
    if(m.nature)row2.push(`<span class="chip">${m.nature}</span>`);
    if(m.ability)row2.push(`<span class="chip">${m.ability}</span>`);
    const im=curImg(m);
    const inner=im?`<div class="clip"><img src="${im}" crossorigin="anonymous"></div>`:`<div class="clip"><div class="mb">${BALLS[m.ball]}</div></div>`;
    const badge=`<div class="ballbadge">${BALLS[m.ball]}</div>`;
    const spark=m.shiny?`<div class="spark">✦</div>`:'';
    return `<div class="mon"><div class="mon-img">${inner}${spark}</div><div class="mon-info"><div class="mon-nm"><span class="nm-ball">${BALLS[m.ball]}</span><span class="nm-txt">${m.name||'이름 없음'}</span></div><div class="mon-tags">${row1.join('')}</div>${row2.length?`<div class="mon-tags">${row2.join('')}</div>`:''}</div></div>`;
  }).join('');
  saveState();
}
async function downloadCard(e){
  const btn=e.target;const old=btn.textContent;btn.textContent='저장 중...';
  if(!window.html2canvas){await new Promise((res,rej)=>{const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';s.onload=res;s.onerror=rej;document.head.appendChild(s);});}
  try{
    const canvas=await html2canvas(document.getElementById('card'),{
      scale:4,backgroundColor:null,useCORS:true,allowTaint:false,imageTimeout:15000,logging:false,
      onclone:(doc)=>{
        // html2canvas renders pixel-font baselines a bit low; nudge chips & names up in the clone only
        doc.querySelectorAll('.chip').forEach(el=>{
          el.style.display='inline-block';
          el.style.height='16px';
          el.style.lineHeight='12px';
          el.style.paddingTop='0px';
          el.style.paddingBottom='3px';
          el.style.paddingLeft='7px';
          el.style.paddingRight='7px';
          el.style.position='relative';
          el.style.top='-2px';
        });
        doc.querySelectorAll('.mon-nm').forEach(el=>{ el.style.lineHeight='1.5'; el.style.overflow='visible'; });
        doc.querySelectorAll('.nm-txt').forEach(el=>{ el.style.position='relative'; el.style.top='-3px'; el.style.overflow='visible'; el.style.lineHeight='1.5'; el.style.paddingBottom='3px'; });
        doc.querySelectorAll('.nm-ball').forEach(el=>{ el.style.position='relative'; el.style.top='-3px'; });
      }
    });
    const a=document.createElement('a');a.download=(state.name||'trainer-card')+'.png';a.href=canvas.toDataURL('image/png');a.click();
  }catch(err){alert('포켓몬 공식 이미지는 외부 서버 보안정책 때문에 저장 시 빠질 수 있어요. 직접 업로드한 이미지는 항상 저장됩니다.');}
  btn.textContent=old;
}

const SAVE_KEY="pkmn_trainer_card_v1";
function saveState(){
  try{ localStorage.setItem(SAVE_KEY, JSON.stringify(state)); }catch(e){}
}
function loadState(){
  try{
    const raw=localStorage.getItem(SAVE_KEY);
    if(!raw)return false;
    const s=JSON.parse(raw);
    Object.assign(state,s);
    // reflect into form fields
    const setv=(id,v)=>{const el=document.getElementById(id);if(el)el.value=v||'';};
    setv('fName',state.name);setv('fAge',state.age);setv('fJob',state.job);setv('fGender',state.gender);
    setv('zoomR',state.imgZoom);setv('xR',state.imgX);setv('yR',state.imgY);
    return true;
  }catch(e){return false;}
}
function resetAll(){ const m=document.getElementById('resetModal'); if(m)m.style.display='flex'; }
function closeResetModal(){ const m=document.getElementById('resetModal'); if(m)m.style.display='none'; }
function doReset(){
  try{localStorage.removeItem(SAVE_KEY);}catch(e){}
  location.reload();
}
loadState();document.documentElement.style.setProperty('--accent', state.banner);document.documentElement.style.setProperty('--accent-soft', hexToSoft(state.banner));buildSwatches();buildIcons();buildTabs();buildEntry();render();updTrPrevAndAdjust();

</script>
